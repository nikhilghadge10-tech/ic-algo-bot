<!doctype html>
<!--
  Local browser dashboard for operating the algo bot.
  It shows bot/broker/ngrok status, edits trading settings, sends test signals,
  updates the Dhan token, and displays recent logs.
  The UI is built with OpenUI5 and talks to control/controlServer.js APIs.
-->
<html>
  <head>
    <meta charset="UTF-8" />
    <title>IC Algo Bot Control Center</title>
    <link rel="icon" type="image/png" href="images/ic-algo-bot-icon.png" />
    <link rel="apple-touch-icon" href="images/ic-algo-bot-icon.png" />
    <link rel="stylesheet" href="style.css" />

    <script
      id="sap-ui-bootstrap"
      src="https://sdk.openui5.org/resources/sap-ui-core.js"
      data-sap-ui-theme="sap_horizon"
      data-sap-ui-libs="sap.m"
      data-sap-ui-async="true"
    ></script>

    <script>
      sap.ui.getCore().attachInit(async function () {
        // Load dashboard config first; it becomes the single UI model.
        const config = await fetch("/api/config").then((r) => r.json());
        config.algoLiveStatus = {};
        config.ngrokUrl = config.ngrokUrl || "";
        config.dhanHealth = null;
        config.RAW_LOGS = "";
        config.LIVE_LOGS = "";
        config.SHOW_READINESS_LOGS = false;
        config.SHOW_MANUAL_SIGNAL_LOGS = true;
        config.SHOW_TRADINGVIEW_SIGNAL_LOGS = true;
        config.SHOW_PAPER_TRADE_LOGS = true;
        config.SHOW_IGNORED_SIGNAL_LOGS = true;
        config.SHOW_DETAILED_SIGNAL_LOGS = false;
        config.TEST_INTERVAL = config.PREMIUM_SL_INTERVAL || "15";
        config.NIFTY_SPOT_LOADING = false;
        config.NIFTY_SPOT_ERROR = "";
        config.TOKEN_COUNTDOWN_TICK = Date.now();
        config.NETWORK_PUBLIC_IP = "";
        config.NETWORK_LOCAL_IPS = [];
        config.NETWORK_IP_ERROR = "";

        const model = new sap.ui.model.json.JSONModel(config);
        sap.ui.getCore().setModel(model);
        let cockpitTabs = null;
        let lastTradingViewWebhookKey = null;
        let webhookBaselineLoaded = false;
        let activeWebhookDialog = null;
        let lastSavedDhanEnvironment = config.DHAN_ENV || "LIVE";
        let dhanHealthRequestSequence = 0;

        // Refresh .env-backed config while preserving transient UI-only values.
        async function refreshConfig() {
          const fresh = await fetch("/api/config").then((r) => r.json());
          const currentData = model.getData();

          fresh.algoLiveStatus = currentData.algoLiveStatus || {};
          fresh.ngrokUrl = fresh.ngrokUrl || currentData.ngrokUrl || "";
          fresh.dhanHealth = currentData.dhanHealth || null;
          fresh.RAW_LOGS = currentData.RAW_LOGS || "";
          fresh.LIVE_LOGS = currentData.LIVE_LOGS || "";
          fresh.SHOW_READINESS_LOGS = currentData.SHOW_READINESS_LOGS === true;
          fresh.SHOW_MANUAL_SIGNAL_LOGS =
            currentData.SHOW_MANUAL_SIGNAL_LOGS !== false;
          fresh.SHOW_TRADINGVIEW_SIGNAL_LOGS =
            currentData.SHOW_TRADINGVIEW_SIGNAL_LOGS !== false;
          fresh.SHOW_PAPER_TRADE_LOGS =
            currentData.SHOW_PAPER_TRADE_LOGS !== false;
          fresh.SHOW_IGNORED_SIGNAL_LOGS =
            currentData.SHOW_IGNORED_SIGNAL_LOGS !== false;
          fresh.SHOW_DETAILED_SIGNAL_LOGS =
            currentData.SHOW_DETAILED_SIGNAL_LOGS === true;
          fresh.TEST_PRICE = currentData.TEST_PRICE || "";
          fresh.TEST_INTERVAL =
            currentData.TEST_INTERVAL || fresh.PREMIUM_SL_INTERVAL || "15";
          fresh.NIFTY_SPOT_LTP = currentData.NIFTY_SPOT_LTP;
          fresh.NIFTY_SPOT_CHECKED_AT = currentData.NIFTY_SPOT_CHECKED_AT;
          fresh.NIFTY_SPOT_LOADING = currentData.NIFTY_SPOT_LOADING || false;
          fresh.NIFTY_SPOT_ERROR = currentData.NIFTY_SPOT_ERROR || "";
          fresh.CALC_RISK_AMOUNT = currentData.CALC_RISK_AMOUNT;
          fresh.CALC_LOSS_PER_LOT = currentData.CALC_LOSS_PER_LOT;
          fresh.CALC_ACTUAL_RISK = currentData.CALC_ACTUAL_RISK;
          fresh.CALC_LONG_LOTS = currentData.CALC_LONG_LOTS;
          fresh.CALC_SHORT_LOTS = currentData.CALC_SHORT_LOTS;
          fresh.TOKEN_COUNTDOWN_TICK =
            currentData.TOKEN_COUNTDOWN_TICK || Date.now();
          fresh.NETWORK_PUBLIC_IP = currentData.NETWORK_PUBLIC_IP || "";
          fresh.NETWORK_LOCAL_IPS = currentData.NETWORK_LOCAL_IPS || [];
          fresh.NETWORK_IP_ERROR = currentData.NETWORK_IP_ERROR || "";

          model.setData(fresh);
        }

        // Pull live position and last-signal state from the algo server.
        async function refreshAlgoStatus() {
          try {
            const selectedPaperTrade = model.getProperty("/PAPER_TRADE");
            const query =
              selectedPaperTrade === "true" || selectedPaperTrade === "false"
                ? `?paperTrade=${encodeURIComponent(selectedPaperTrade)}`
                : "";
            const status = await fetch(`/api/algo-status${query}`).then((r) =>
              r.json(),
            );
            model.setProperty("/algoLiveStatus", status);
          } catch (error) {
            model.setProperty("/algoLiveStatus", {
              running: false,
              currentPosition: null,
              lastSignal: "",
              lastSignalTime: "",
              lastTrades: [],
              message: "Algo server not reachable",
            });
          }
        }

        // Refresh the public TradingView webhook URL exposed by ngrok.
        async function refreshNgrokUrl() {
          try {
            const result = await fetch("/api/ngrok-url").then((r) => r.json());

            model.setProperty("/ngrokRunning", !!result.running);
            model.setProperty("/ngrokUrl", result.url || "");
          } catch (error) {
            model.setProperty("/ngrokRunning", false);
            model.setProperty("/ngrokUrl", "");
          }
        }

        async function refreshNetworkIp() {
          try {
            const result = await fetch("/api/network-ip").then((r) => r.json());

            model.setProperty("/NETWORK_PUBLIC_IP", result.publicIp || "");
            model.setProperty("/NETWORK_LOCAL_IPS", result.localIps || []);
            model.setProperty("/NETWORK_IP_ERROR", result.error || "");
          } catch (error) {
            model.setProperty("/NETWORK_PUBLIC_IP", "");
            model.setProperty("/NETWORK_LOCAL_IPS", []);
            model.setProperty("/NETWORK_IP_ERROR", "Public IP unavailable");
          }
        }

        // Ask the algo server whether the Dhan access token is currently valid.
        async function refreshDhanHealth() {
          const requestedEnvironment =
            model.getProperty("/DHAN_ENV") || "LIVE";
          const requestSequence = ++dhanHealthRequestSequence;

          try {
            const result = await fetch("/api/dhan-health").then((r) =>
              r.json(),
            );

            if (
              requestSequence !== dhanHealthRequestSequence ||
              requestedEnvironment !== model.getProperty("/DHAN_ENV") ||
              (result.environment &&
                result.environment !== requestedEnvironment)
            ) {
              return;
            }

            model.setProperty("/dhanHealth", result);
          } catch (error) {
            if (
              requestSequence !== dhanHealthRequestSequence ||
              requestedEnvironment !== model.getProperty("/DHAN_ENV")
            ) {
              return;
            }

            model.setProperty("/dhanHealth", {
              connected: false,
              environment: requestedEnvironment,
              message: "Dhan health check failed",
            });
          }
        }

        async function refreshNiftySpotPrice() {
          model.setProperty("/NIFTY_SPOT_LOADING", true);
          model.setProperty("/NIFTY_SPOT_ERROR", "");

          try {
            const result = await fetch("/api/nifty-spot").then((r) => r.json());

            if (!result.success) {
              const message = result.message || "NIFTY spot unavailable";

              model.setProperty("/NIFTY_SPOT_ERROR", message);
              sap.m.MessageToast.show(message);
              return;
            }

            model.setProperty("/TEST_PRICE", formatIndianWholeNumber(result.ltp));
            model.setProperty("/NIFTY_SPOT_LTP", result.ltp);
            model.setProperty("/NIFTY_SPOT_CHECKED_AT", result.checkedAt);
          } catch (error) {
            model.setProperty("/NIFTY_SPOT_ERROR", "NIFTY spot price unavailable");
            sap.m.MessageToast.show("NIFTY spot price unavailable");
          } finally {
            model.setProperty("/NIFTY_SPOT_LOADING", false);
          }
        }

        function getDhanTokenRemaining(updatedAt) {
          if (!updatedAt) {
            return null;
          }

          const updated = new Date(updatedAt).getTime();

          const expires = updated + 24 * 60 * 60 * 1000;

          return expires - Date.now();
        }

        // Dhan access tokens are short-lived, so show a simple expiry countdown.
        function getDhanTokenCountdown(updatedAt) {
          const remaining = getDhanTokenRemaining(updatedAt);

          if (remaining === null) {
            return "Token update time missing";
          }

          if (remaining <= 0) {
            return "Token expired";
          }

          const hours = Math.floor(remaining / (1000 * 60 * 60));

          const minutes = Math.floor(
            (remaining % (1000 * 60 * 60)) / (1000 * 60),
          );

          return `Expires in ${hours}h ${minutes}m`;
        }

        function isDhanTokenExpiringSoon(updatedAt) {
          const remaining = getDhanTokenRemaining(updatedAt);

          const expiringSoon =
            remaining !== null && remaining > 0 && remaining < 60 * 60 * 1000;

          return expiringSoon ? "true" : "false";
        }

        function isDhanTokenExpired(updatedAt) {
          const remaining = getDhanTokenRemaining(updatedAt);
          return remaining !== null && remaining <= 0 ? "true" : "false";
        }

        function getDhanCredentialStatus(
          environment,
          liveUpdatedAt,
          sandboxConfigured,
        ) {
          if (environment === "SANDBOX") {
            return sandboxConfigured
              ? "Sandbox token configured"
              : "Sandbox token not configured";
          }

          return getDhanTokenCountdown(liveUpdatedAt);
        }

        function confirmLiveDhanSwitch() {
          return new Promise((resolve) => {
            const dialog = new sap.m.Dialog({
              title: "Switch to LIVE Dhan?",
              type: "Message",
              state: "Warning",
              content: [
                new sap.m.Text({
                  text: "New webhook entries can place real-money orders.",
                }).addStyleClass("sapUiSmallMargin"),
              ],
              beginButton: new sap.m.Button({
                text: "Switch to LIVE",
                type: "Reject",
                press: function () {
                  dialog.close();
                  resolve(true);
                },
              }),
              endButton: new sap.m.Button({
                text: "Cancel",
                press: function () {
                  dialog.close();
                  resolve(false);
                },
              }),
              afterClose: function () {
                dialog.destroy();
              },
            });

            dialog.open();
          });
        }

        // Open a proper SAP UI5 dialog for updating the Dhan token.
        async function updateDhanToken() {
          const environment = model.getProperty("/DHAN_ENV") || "LIVE";
          const sandbox = environment === "SANDBOX";
          const tokenInput = new sap.m.Input({
            type: "Password",
            width: "100%",
            placeholder: "Paste new Dhan access token",
            liveChange: function (e) {
              const hasToken = !!e.getParameter("value").trim();

              updateButton.setEnabled(hasToken);
              tokenInput.setValueState(hasToken ? "None" : "Error");
            },
            submit: function () {
              if (updateButton.getEnabled()) {
                updateButton.firePress();
              }
            },
          });

          const updateButton = new sap.m.Button({
            text: "Update Token",
            icon: "sap-icon://key",
            type: "Emphasized",
            enabled: false,
            press: async function () {
              const token = tokenInput.getValue().trim();

              if (!token) {
                tokenInput.setValueState("Error");
                tokenInput.setValueStateText("Token is required");
                tokenInput.focus();
                return;
              }

              dialog.setBusy(true);
              updateButton.setEnabled(false);

              try {
                const result = await fetch("/api/update-dhan-token", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({
                    token,
                    environment,
                  }),
                }).then((r) => r.json());

                sap.m.MessageToast.show(result.message);

                await refreshConfig();
                await refreshDhanHealth();

                if (result.success) {
                  dialog.close();
                }
              } catch (error) {
                sap.m.MessageToast.show("Token update failed");
              } finally {
                dialog.setBusy(false);
                updateButton.setEnabled(!!tokenInput.getValue().trim());
              }
            },
          });

          const dialog = new sap.m.Dialog({
            title: `Update Dhan ${environment} Credentials`,
            contentWidth: "480px",
            draggable: true,
            resizable: true,
            content: [
              new sap.m.VBox({
                items: [
                  new sap.m.MessageStrip({
                    text: sandbox
                      ? `Sandbox Client ID ${
                          model.getProperty("/DHAN_SANDBOX_CLIENT_ID") ||
                          "2601312809"
                        } is fixed. Enter only the sandbox access token.`
                      : "These are your LIVE Dhan credentials. Check the environment badge before saving.",
                    type: "Information",
                    showIcon: true,
                  }),

                  new sap.m.Label({
                    text: "Access Token",
                    labelFor: tokenInput,
                  }).addStyleClass("tokenDialogLabel"),

                  tokenInput,

                  new sap.m.Text({
                    text: {
                      parts: [
                        { path: "/DHAN_ENV" },
                        { path: "/DHAN_TOKEN_UPDATED_AT" },
                        { path: "/DHAN_SANDBOX_CONFIGURED" },
                      ],
                      formatter: getDhanCredentialStatus,
                    },
                    customData: [
                      new sap.ui.core.CustomData({
                        key: "expiring-soon",
                        value: {
                          parts: [
                            { path: "/DHAN_ENV" },
                            { path: "/DHAN_TOKEN_UPDATED_AT" },
                          ],
                          formatter: (env, updatedAt) =>
                            env === "LIVE"
                              ? isDhanTokenExpiringSoon(updatedAt)
                              : "false",
                        },
                        writeToDom: true,
                      }),
                      new sap.ui.core.CustomData({
                        key: "expired",
                        value: {
                          parts: [
                            { path: "/DHAN_ENV" },
                            { path: "/DHAN_TOKEN_UPDATED_AT" },
                          ],
                          formatter: (env, updatedAt) =>
                            env === "LIVE"
                              ? isDhanTokenExpired(updatedAt)
                              : "false",
                        },
                        writeToDom: true,
                      }),
                    ],
                  }).addStyleClass("tokenCountdown"),
                ],
              }).addStyleClass("tokenDialogContent"),
            ],
            beginButton: updateButton,
            endButton: new sap.m.Button({
              text: "Cancel",
              press: function () {
                dialog.close();
              },
            }),
            afterClose: function () {
              dialog.destroy();
            },
          });

          dialog.open();
          setTimeout(function () {
            tokenInput.focus();
          }, 0);
        }

        // Pull recent logs from the backend; the backend already sorts newest-first.
        async function refreshLogs() {
          const result = await fetch("/api/logs").then((r) => r.json());
          const logs = result.logs || "";

          model.setProperty("/RAW_LOGS", logs);
          applyLogFilters();
          notifyLatestTradingViewWebhook(logs);
        }

        function isReadinessLogLine(line) {
          return (
            /LIFECYCLE|Control dashboard|Algo server|Ngrok/i.test(line) &&
            !/MANUAL_SIGNAL/i.test(line)
          );
        }

        function isManualSignalLogLine(line) {
          return /MANUAL_SIGNAL|"source":"MANUAL_SIGNAL"|Test signal sent/i.test(
            line,
          );
        }

        function isSignalLogLine(line) {
          return /Webhook received:|Last Signal Updated:|Execution context:|Selected Option:|Entry sizing:|Position changed to|Position closed|ignored because|Unknown signal|DHAN .* ERROR|Telegram Error|failed/i.test(
            line,
          );
        }

        function getWebhookPayload(line) {
          const match = line.match(/Webhook received: (\{.*\})/);

          if (!match) {
            return null;
          }

          try {
            return JSON.parse(match[1]);
          } catch (error) {
            return null;
          }
        }

        function getLatestTradingViewWebhook(logs) {
          const lines = String(logs || "").split("\n");

          for (const line of lines) {
            if (!/Webhook received:/i.test(line)) {
              continue;
            }

            const payload = getWebhookPayload(line);

            if (
              !payload ||
              String(payload.source || "").toUpperCase() === "MANUAL_SIGNAL"
            ) {
              continue;
            }

            return {
              key: [
                payload.signal || "",
                payload.symbol || "",
                payload.time || "",
              ].join("|"),
              payload,
              receivedAt: getLogTimestamp(line),
            };
          }

          return null;
        }

        function openMonitoringFromWebhook(dialog) {
          if (cockpitTabs) {
            cockpitTabs.setSelectedKey("monitoring");
          }

          refreshLogs();

          if (dialog) {
            dialog.close();
          }
        }

        function showTradingViewWebhookPopup(webhook) {
          const payload = webhook.payload;
          const detailsItem = new sap.m.StandardListItem({
            title: `${payload.signal || "TradingView Signal"} • ${
              payload.symbol || "NIFTY"
            }`,
            description: [
              `Price: ${payload.price ?? "-"}`,
              `Candle: ${payload.time || "-"}`,
              `Interval: ${payload.interval || payload.timeframe || "-"}`,
              `Received: ${webhook.receivedAt || "just now"}`,
            ].join("  •  "),
            icon: "sap-icon://notification-2",
            type: "Active",
            press: function () {
              openMonitoringFromWebhook(activeWebhookDialog);
            },
          });

          if (activeWebhookDialog) {
            activeWebhookDialog.destroy();
          }

          activeWebhookDialog = new sap.m.Dialog({
            title: "TradingView Webhook Received",
            contentWidth: "520px",
            content: [
              new sap.m.List({
                showSeparators: "None",
                items: [detailsItem],
              }).addStyleClass("webhookPopupList"),
            ],
            beginButton: new sap.m.Button({
              text: "Open Monitoring",
              icon: "sap-icon://activity-items",
              type: "Emphasized",
              press: function () {
                openMonitoringFromWebhook(activeWebhookDialog);
              },
            }),
            endButton: new sap.m.Button({
              text: "Dismiss",
              press: function () {
                activeWebhookDialog.close();
              },
            }),
            afterClose: function () {
              activeWebhookDialog.destroy();
              activeWebhookDialog = null;
            },
          }).addStyleClass("webhookPopupDialog");

          activeWebhookDialog.open();
        }

        function notifyLatestTradingViewWebhook(logs) {
          const webhook = getLatestTradingViewWebhook(logs);

          if (!webhook) {
            webhookBaselineLoaded = true;
            return;
          }

          if (!webhookBaselineLoaded) {
            lastTradingViewWebhookKey = webhook.key;
            webhookBaselineLoaded = true;
            return;
          }

          if (webhook.key === lastTradingViewWebhookKey) {
            return;
          }

          lastTradingViewWebhookKey = webhook.key;
          showTradingViewWebhookPopup(webhook);
        }

        function getReadableOption(text) {
          if (!text) return "";

          const selectedMatch = text.match(/Selected Option:\s*(\d+)\s+(CE|PE)/i);

          if (selectedMatch) {
            return `NIFTY ${selectedMatch[1]} ${selectedMatch[2].toUpperCase()}`;
          }

          const symbolMatch = text.match(/NIFTY.*?(\d{5})\s+(CALL|PUT)/i);

          if (symbolMatch) {
            return `NIFTY ${symbolMatch[1]} ${
              symbolMatch[2].toUpperCase() === "CALL" ? "CE" : "PE"
            }`;
          }

          return text;
        }

        function getSignalSourceLabel(lines) {
          return lines.some(isManualSignalLogLine) ? "Manual" : "TradingView";
        }

        function getEntrySizingDetails(line) {
          if (!line) {
            return null;
          }

          const getValue = (key) => {
            const match = line.match(new RegExp(`${key}=(\\S+)`, "i"));
            return match ? match[1] : "";
          };

          if (!/Entry sizing:/i.test(line)) {
            return null;
          }

          return {
            source: getValue("source"),
            optionLtp: getValue("premium"),
            premiumSl: getValue("premiumSL"),
            previousCandleLow:
              getValue("candleLow") || getValue("premiumSL"),
            previousCandleHigh: getValue("candleHigh"),
            previousCandleRange: getValue("candleRange"),
            halfCandle: getValue("halfCandle") === "true",
            hugeThreshold: getValue("hugeThreshold"),
            riskPoints: getValue("riskPoints"),
            lots: getValue("lots"),
            quantity: getValue("quantity"),
          };
        }

        function getExecutionContextDetails(line) {
          if (!line || !/Execution context:/i.test(line)) {
            return null;
          }

          const getValue = (key) => {
            const match = line.match(new RegExp(`${key}=(\\S+)`, "i"));
            return match ? match[1] : "";
          };

          return {
            tradeMode: getValue("tradeMode"),
            orderRoute: getValue("orderRoute"),
            dhanEnvironment: getValue("dhanEnvironment"),
            marketData: getValue("marketData"),
            interval: getValue("interval"),
          };
        }

        function getSignalInterval(lines, signalItem, executionContext) {
          const payloadInterval =
            signalItem?.payload?.interval || signalItem?.payload?.timeframe;

          if (payloadInterval) {
            return String(payloadInterval);
          }

          if (executionContext?.interval) {
            return String(executionContext.interval);
          }

          const premiumSlPlanLine = lines.find((line) =>
            /Premium SL-Limit plan:.*interval=/i.test(line),
          );
          const planMatch = premiumSlPlanLine?.match(/\binterval=(\S+)/i);

          return planMatch ? planMatch[1] : "";
        }

        function getExecutionModeLabel(context) {
          if (!context) return "";
          if (context.tradeMode === "PAPER") return "Paper simulation (no Dhan order)";
          if (context.tradeMode === "SANDBOX") return "Real Dhan Sandbox order";
          return "Real Dhan LIVE order";
        }

        const SUMMARY_LOG_LABEL_WIDTH = 18;

        function formatSummaryLine(label, value) {
          return `${label.padEnd(SUMMARY_LOG_LABEL_WIDTH, " ")}: ${value}`;
        }

        function getLogTimestamp(line) {
          const match = line.match(/^(.*?)\s+\[[A-Z]+\]/);
          return match ? match[1] : "";
        }

        function getTimestampSortValue(timestamp) {
          const match = String(timestamp || "").match(
            /^(\d{1,2})\/(\d{1,2})\/(\d{4}),\s+(\d{1,2}):(\d{2}):(\d{2})\s+(am|pm)$/i,
          );

          if (!match) {
            return 0;
          }

          let hour = Number(match[4]);
          const meridiem = match[7].toLowerCase();

          if (meridiem === "pm" && hour !== 12) {
            hour += 12;
          }

          if (meridiem === "am" && hour === 12) {
            hour = 0;
          }

          return new Date(
            Number(match[3]),
            Number(match[2]) - 1,
            Number(match[1]),
            hour,
            Number(match[5]),
            Number(match[6]),
          ).getTime();
        }

        function formatTimestampedSummary(timestamp, summary) {
          return timestamp ? `${timestamp}  : ${summary}` : summary;
        }

        function getReadinessLogParts(line) {
          const match = line.match(/^(.*?)\s+\[[A-Z]+\]\s+LIFECYCLE\s+(.+)$/);

          if (!match) {
            return null;
          }

          return {
            timestamp: match[1],
            message: match[2],
          };
        }

        function formatReadinessSummary(timestamp, message) {
          return `${timestamp}  : ${message}`;
        }

        function getReadinessSummaryMessage(message) {
          if (/Control dashboard started/i.test(message)) {
            return { key: "control-started", text: "Control dashboard started" };
          }

          if (
            /Algo server process exited.*SIGTERM|Algo server received SIGTERM|Algo server stop requested/i.test(
              message,
            )
          ) {
            return { key: "algo-stopped", text: "Algo server stopped" };
          }

          if (/Algo server listening on port|Algo server start requested/i.test(message)) {
            return { key: "algo-started", text: "Algo server started" };
          }

          if (/Ngrok process exited.*SIGTERM|Ngrok stop requested/i.test(message)) {
            return { key: "ngrok-stopped", text: "Ngrok stopped" };
          }

          if (/Ngrok start requested but already running/i.test(message)) {
            return { key: "ngrok-running", text: "Ngrok already running" };
          }

          if (/Ngrok start requested/i.test(message)) {
            return { key: "ngrok-started", text: "Ngrok started" };
          }

          return null;
        }

        function getConciseReadinessItems(lines) {
          const seen = new Set();
          const summaryItems = [];

          lines.forEach((line) => {
            const parts = getReadinessLogParts(line);

            if (!parts) {
              return;
            }

            const summary = getReadinessSummaryMessage(parts.message);

            if (!summary || seen.has(summary.key)) {
              return;
            }

            seen.add(summary.key);
            summaryItems.push({
              sortValue: getTimestampSortValue(parts.timestamp),
              text: formatReadinessSummary(parts.timestamp, summary.text),
            });
          });

          return summaryItems;
        }

        function getFailureReason(line) {
          if (!line) return "";

          const invalidIpMatch = line.match(/"errorMessage":"([^"]+)"/);

          if (invalidIpMatch) {
            return invalidIpMatch[1];
          }

          if (/symbol is not NIFTY/i.test(line)) {
            const symbolMatch = line.match(/not NIFTY:\s*([A-Z0-9]+)/i);
            return symbolMatch
              ? `Symbol is not NIFTY (${symbolMatch[1]})`
              : "Symbol is not NIFTY";
          }

          if (/Unknown signal/i.test(line)) {
            return "Unknown signal";
          }

          if (/disabled/i.test(line)) {
            return "Trading permission disabled";
          }

          if (/daily trade limit reached/i.test(line)) {
            return "Daily trade limit reached";
          }

          if (/premium stop-loss setup failed/i.test(line)) {
            return "Premium stop-loss setup failed";
          }

          if (/premium stop-loss is active/i.test(line)) {
            return "Premium stop-loss is active";
          }

          if (/calculated quantity is invalid/i.test(line)) {
            return "Invalid quantity";
          }

          if (/Telegram Error/i.test(line)) {
            return "Telegram delivery failed";
          }

          const manualSignalResponseLostMatch = line.match(
            /MANUAL_SIGNAL response lost after processing .*:\s*(.+)$/i,
          );

          if (manualSignalResponseLostMatch) {
            return `Response lost after processing (${manualSignalResponseLostMatch[1]})`;
          }

          const manualSignalFailureMatch = line.match(/MANUAL_SIGNAL failed:\s*(.+)$/i);

          if (manualSignalFailureMatch) {
            return manualSignalFailureMatch[1];
          }

          const failedMatch = line.match(/\] (.+failed.*)$/i);
          return failedMatch ? failedMatch[1] : "";
        }

        function getConciseSignalItems(lines) {
          const signalLines = lines.filter(
            (line) => !isReadinessLogLine(line),
          );

          if (!signalLines.length) {
            return [];
          }

          const sourceLabel = getSignalSourceLabel(signalLines);
          const payloadItems = signalLines
            .map((line) => ({ line, payload: getWebhookPayload(line) }))
            .filter((item) => item.payload);
          const payloads = payloadItems.map((item) => item.payload);
          const entryItem = payloadItems.find((item) =>
            /_ENTRY$/.test(item.payload.signal),
          );
          const exitItem = payloadItems.find((item) =>
            /_EXIT$/.test(item.payload.signal),
          );
          const entry = entryItem?.payload;
          const exit = exitItem?.payload;
          const openOptionLine = signalLines.find((line) => /Selected Option:/i.test(line));
          const closeOptionLine = signalLines.find((line) => /Position closed:/i.test(line));
          const entrySizingLine = signalLines.find((line) => /Entry sizing:/i.test(line));
          const entrySizing = getEntrySizingDetails(entrySizingLine);
          const executionContextLine = signalLines.find((line) =>
            /Execution context:/i.test(line),
          );
          const executionContext = getExecutionContextDetails(
            executionContextLine,
          );
          const openOption = getReadableOption(openOptionLine);
          const closeOption = getReadableOption(closeOptionLine || openOptionLine);
          const ignoredLine = signalLines.find((line) =>
            /ignored because|Unknown signal/i.test(line),
          );
          const orderErrorLine = signalLines.find((line) => /DHAN .* ERROR/i.test(line));
          const brokerEntryFailureLine = signalLines.find((line) =>
            /(LONG_ENTRY|SHORT_ENTRY).*(not filled|rejected|failed)/i.test(line),
          );
          const positionChangedLine = signalLines.find((line) =>
            /Position changed to (LONG|SHORT)/i.test(line),
          );
          const manualSignalResponseLostLine = signalLines.find((line) =>
            /MANUAL_SIGNAL response lost after processing/i.test(line),
          );
          const manualSignalFailureLine = signalLines.find((line) =>
            /MANUAL_SIGNAL failed:/i.test(line),
          );
          const telegramErrorLine = signalLines.find((line) =>
            /Telegram Error/i.test(line),
          );
          const summaryItems = [];
          const fallbackTimestamp = getLogTimestamp(signalLines[0]);
          const pushSummaryLine = (label, value, sourceLine) => {
            const timestamp = getLogTimestamp(sourceLine || "") || fallbackTimestamp;
            summaryItems.push({
              sortValue: getTimestampSortValue(timestamp),
              timestamp,
              label,
              value,
              text: formatTimestampedSummary(timestamp, formatSummaryLine(label, value)),
            });
          };

          if (entry) {
            pushSummaryLine(`${sourceLabel} Entry`, entry.signal, entryItem.line);
            const signalInterval =
              entry.interval || entry.timeframe || executionContext?.interval;

            if (signalInterval) {
              pushSummaryLine(
                "Timeframe",
                `${signalInterval} Minute`,
                entryItem.line,
              );
            }
            if (executionContext) {
              pushSummaryLine(
                "Execution Mode",
                getExecutionModeLabel(executionContext),
                executionContextLine,
              );
            }

            if (orderErrorLine) {
              pushSummaryLine("Order Failed", getFailureReason(orderErrorLine), orderErrorLine);
            } else if (brokerEntryFailureLine) {
              pushSummaryLine(
                "Order Failed",
                getFailureReason(brokerEntryFailureLine) ||
                  "Broker did not fill the entry",
                brokerEntryFailureLine,
              );
            } else if (manualSignalResponseLostLine) {
              pushSummaryLine(
                "Signal Warning",
                getFailureReason(manualSignalResponseLostLine),
                manualSignalResponseLostLine,
              );
            } else if (manualSignalFailureLine) {
              pushSummaryLine(
                "Signal Failed",
                getFailureReason(manualSignalFailureLine),
                manualSignalFailureLine,
              );
            } else if (ignoredLine) {
              pushSummaryLine("Signal Ignored", getFailureReason(ignoredLine), ignoredLine);
            } else if (openOption && positionChangedLine) {
              pushSummaryLine("Position Opened", openOption, positionChangedLine);
            }

            if (entrySizing) {
              pushSummaryLine(
                "Lots to Buy",
                `${entrySizing.lots} Lots (${entrySizing.quantity} Qty)`,
                entrySizingLine,
              );
              pushSummaryLine(
                "SL Risk Points",
                entrySizing.riskPoints,
                entrySizingLine,
              );

              if (
                entrySizing.source === "LIVE_PREMIUM" &&
                entrySizing.previousCandleLow !== "n/a"
              ) {
                pushSummaryLine(
                  "Prev. Candle Low",
                  entrySizing.previousCandleLow,
                  entrySizingLine,
                );
              }

              if (
                entrySizing.source === "LIVE_PREMIUM" &&
                entrySizing.halfCandle
              ) {
                pushSummaryLine(
                  "Adjusted Premium SL",
                  `${entrySizing.premiumSl} (half of ${entrySizing.previousCandleRange}-point candle)`,
                  entrySizingLine,
                );
              }

              if (
                entrySizing.source === "LIVE_PREMIUM" &&
                entrySizing.optionLtp !== "n/a"
              ) {
                pushSummaryLine(
                  "Option LTP",
                  entrySizing.optionLtp,
                  entrySizingLine,
                );
              }
            }
          }

          if (exit) {
            pushSummaryLine(`${sourceLabel} Exit`, exit.signal, exitItem.line);
            if (executionContext) {
              pushSummaryLine(
                "Execution Mode",
                getExecutionModeLabel(executionContext),
                executionContextLine,
              );
            }

            if (orderErrorLine) {
              pushSummaryLine("Order Failed", getFailureReason(orderErrorLine), orderErrorLine);
            } else if (manualSignalResponseLostLine) {
              pushSummaryLine(
                "Signal Warning",
                getFailureReason(manualSignalResponseLostLine),
                manualSignalResponseLostLine,
              );
            } else if (manualSignalFailureLine) {
              pushSummaryLine(
                "Signal Failed",
                getFailureReason(manualSignalFailureLine),
                manualSignalFailureLine,
              );
            } else if (ignoredLine) {
              pushSummaryLine("Signal Ignored", getFailureReason(ignoredLine), ignoredLine);
            } else if (closeOption) {
              pushSummaryLine("Position Closed", closeOption, closeOptionLine);
            }
          }

          if (!entry && !exit && ignoredLine) {
            const payload = payloads[0];
            pushSummaryLine(
              `${sourceLabel} Signal`,
              payload?.signal || "UNKNOWN",
              payloadItems[0]?.line,
            );
            pushSummaryLine("Signal Ignored", getFailureReason(ignoredLine), ignoredLine);
          }

          if (!entry && !exit && manualSignalFailureLine) {
            const payload = payloads[0];
            pushSummaryLine(
              `${sourceLabel} Signal`,
              payload?.signal || "UNKNOWN",
              payloadItems[0]?.line,
            );
            pushSummaryLine(
              "Signal Failed",
              getFailureReason(manualSignalFailureLine),
              manualSignalFailureLine,
            );
          }

          if (!entry && !exit && manualSignalResponseLostLine) {
            const payload = payloads[0];
            pushSummaryLine(
              `${sourceLabel} Signal`,
              payload?.signal || "UNKNOWN",
              payloadItems[0]?.line,
            );
            pushSummaryLine(
              "Signal Warning",
              getFailureReason(manualSignalResponseLostLine),
              manualSignalResponseLostLine,
            );
          }

          if (telegramErrorLine && summaryItems.length) {
            pushSummaryLine(
              "Alert Warning",
              getFailureReason(telegramErrorLine),
              telegramErrorLine,
            );
          }

          return summaryItems;
        }

        function formatTradeModeForLog(context) {
          if (!context) return "Not recorded (legacy)";
          if (context.tradeMode === "PAPER") return "Paper";
          if (context.tradeMode === "SANDBOX") return "Sandbox";
          return "Live";
        }

        const TRADE_LOG_LABEL_WIDTH = 18;

        function formatTradeLogField(label, value) {
          if (!label) return "";
          if (!label.trim()) return " ";

          return `${label.padEnd(TRADE_LOG_LABEL_WIDTH, " ")} : ${value ?? "-"}`;
        }

        function formatTradeLogPair(leftLabel, leftValue, rightLabel, rightValue) {
          const left = formatTradeLogField(leftLabel, leftValue);
          const right = formatTradeLogField(rightLabel, rightValue);

          return right ? `${left.padEnd(42, " ")} | ${right}` : left;
        }

        function getConciseSignalBlock(lines) {
          const items = getConciseSignalItems(lines);

          if (!items.length) {
            return [];
          }

          const byLabel = new Map(items.map((item) => [item.label, item]));
          const signalItem = items.find((item) =>
            /^(Manual|TradingView) (Entry|Exit|Signal)$/.test(item.label),
          );
          const signalPayloadItem = lines
            .map((line) => ({ line, payload: getWebhookPayload(line) }))
            .find((item) => item.payload);
          const source = signalItem?.label.startsWith("Manual")
            ? "Manual"
            : "TradingView";
          const executionContext = getExecutionContextDetails(
            lines.find((line) => /Execution context:/i.test(line)),
          );
          const signalInterval = getSignalInterval(
            lines,
            signalPayloadItem,
            executionContext,
          );
          const outcomeItem = items.find((item) =>
            [
              "Position Opened",
              "Position Closed",
              "Signal Ignored",
              "Order Failed",
              "Signal Failed",
              "Signal Warning",
            ].includes(item.label),
          );
          const timestamp =
            signalItem?.timestamp ||
            items.find((item) => item.timestamp)?.timestamp ||
            "";
          const header =
            `--------------------------------  ${timestamp || "Unknown time"}  ` +
            "--------------------------------";
          const headerBorder =
            "-------------------------------------------------------------------------------------------";
          const optionLtp = byLabel.get("Option LTP")?.value;
          const previousCandleLow = byLabel.get("Prev. Candle Low")?.value;
          const lotsToBuy = byLabel.get("Lots to Buy")?.value;
          const slRiskPoints = byLabel.get("SL Risk Points")?.value;

          return [
            headerBorder,
            header,
            headerBorder,
            formatTradeLogPair(
              "Source",
              source,
              "Trade Mode",
              formatTradeModeForLog(executionContext),
            ),
            formatTradeLogPair(
              "Signal",
              `${signalItem?.value || "UNKNOWN"} (${
                signalInterval
                  ? `${signalInterval} min`
                  : "interval not recorded"
              })`,
              outcomeItem?.label,
              outcomeItem?.value,
            ),
            ...(optionLtp || previousCandleLow
              ? [
                  formatTradeLogPair(
                    optionLtp ? "Option LTP" : "",
                    optionLtp,
                    previousCandleLow ? "Prev. Candle Low" : "",
                    previousCandleLow,
                  ),
                ]
              : []),
            ...(lotsToBuy || slRiskPoints
              ? [
                  formatTradeLogPair(
                    lotsToBuy ? "Lots to Buy" : "",
                    lotsToBuy,
                    slRiskPoints ? "SL Risk Points" : "",
                    slRiskPoints,
                  ),
                ]
              : []),
          ];
        }

        function getConciseSignalBlocks(lines) {
          const signalTimestamps = Array.from(
            new Set(
              lines
                .filter((line) => /Webhook received:/i.test(line))
                .map(getLogTimestamp)
                .filter(Boolean),
            ),
          ).sort(
            (a, b) => getTimestampSortValue(b) - getTimestampSortValue(a),
          );

          if (!signalTimestamps.length) {
            return getConciseSignalBlock(lines);
          }

          return signalTimestamps.flatMap((timestamp) =>
            getConciseSignalBlock(
              lines.filter((line) => getLogTimestamp(line) === timestamp),
            ),
          );
        }

        function getDisplayLogLines(lines, data) {
          if (data.SHOW_DETAILED_SIGNAL_LOGS) {
            return lines;
          }

          const signalBlock = getConciseSignalBlocks(
            lines.filter((line) => !isReadinessLogLine(line)),
          );

          if (signalBlock.length) {
            return signalBlock;
          }

          return [
            ...getConciseReadinessItems(lines.filter(isReadinessLogLine)),
          ]
            .sort((a, b) => b.sortValue - a.sortValue)
            .map((item) => item.text);
        }

        function applyLogFilters() {
          const data = model.getData();
          const rawLogs = data.RAW_LOGS || "";

          if (!rawLogs || rawLogs === "No logs yet.") {
            model.setProperty("/LIVE_LOGS", rawLogs);
            return;
          }

          const outputLines = [];
          let pendingSectionSeparators = [];
          let sectionLines = [];
          let dayHasVisibleSection = false;
          let inManualSignalBlock = false;

          function flushLogSection() {
            if (!sectionLines.length) {
              pendingSectionSeparators = [];
              return;
            }

            if (
              !data.SHOW_PAPER_TRADE_LOGS &&
              sectionLines.some((line) =>
                /Execution context:.*tradeMode=PAPER/i.test(line),
              )
            ) {
              pendingSectionSeparators = [];
              sectionLines = [];
              return;
            }

            if (
              !data.SHOW_IGNORED_SIGNAL_LOGS &&
              sectionLines.some((line) =>
                /ignored because|Unknown signal|Duplicate webhook ignored/i.test(
                  line,
                ),
              )
            ) {
              pendingSectionSeparators = [];
              sectionLines = [];
              return;
            }

            const displayLines = getDisplayLogLines(sectionLines, data);

            if (!displayLines.length) {
              pendingSectionSeparators = [];
              sectionLines = [];
              return;
            }

            outputLines.push(
              ...(data.SHOW_DETAILED_SIGNAL_LOGS
                ? pendingSectionSeparators
                : []),
              ...displayLines,
            );
            dayHasVisibleSection = true;
            pendingSectionSeparators = [];
            sectionLines = [];
          }

          rawLogs.split("\n").forEach((line) => {
            if (/^=+/.test(line)) {
              flushLogSection();
              if (dayHasVisibleSection && data.SHOW_DETAILED_SIGNAL_LOGS) {
                outputLines.push(line);
              }
              dayHasVisibleSection = false;
              return;
            }

            if (/^---------------------------/.test(line)) {
              if (/Trade\s+-?\d+/.test(line)) {
                pendingSectionSeparators.push(line);
              } else {
                flushLogSection();
                pendingSectionSeparators = [line];
              }

              return;
            }

            const manualLine = isManualSignalLogLine(line);
            const readinessLine = isReadinessLogLine(line);
            let visible = false;

            if (/MANUAL_SIGNAL (completed|failed)/i.test(line)) {
              inManualSignalBlock = true;
            }

            if (readinessLine) {
              visible = data.SHOW_READINESS_LOGS;
            } else if (manualLine || inManualSignalBlock) {
              visible = data.SHOW_MANUAL_SIGNAL_LOGS;
            } else if (isSignalLogLine(line)) {
              visible = data.SHOW_TRADINGVIEW_SIGNAL_LOGS;
            }

            if (visible) {
              sectionLines.push(line);
            }

            if (/MANUAL_SIGNAL requested/i.test(line)) {
              inManualSignalBlock = false;
            }
          });

          flushLogSection();

          model.setProperty(
            "/LIVE_LOGS",
            outputLines.length
              ? outputLines.join("\n")
              : "No logs match the selected filters.",
          );
        }

        function updateLogFilters() {
          setTimeout(applyLogFilters, 0);
        }

        async function copyDisplayedLogs() {
          const logs = model.getProperty("/LIVE_LOGS") || "";

          if (!logs || logs === "No logs match the selected filters.") {
            sap.m.MessageToast.show("No displayed logs to copy");
            return;
          }

          try {
            await navigator.clipboard.writeText(logs);
            sap.m.MessageToast.show("Displayed log copied");
          } catch (error) {
            sap.m.MessageToast.show("Unable to copy log");
          }
        }

        async function handlePermissionSwitchChange(path, state) {
          model.setProperty("/" + path, state ? "true" : "false");
          await saveConfig({ silent: true });

          if (path === "PAPER_TRADE") {
            await refreshAlgoStatus();
          }
        }

        // Save dashboard settings to .env.
        async function saveConfig(options = {}) {
          const data = model.getData();

          await fetch("/api/config", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              ALLOW_BUY: data.ALLOW_BUY,
              ALLOW_SELL: data.ALLOW_SELL,
              PAPER_TRADE: data.PAPER_TRADE,
              TELEGRAM_ENABLED: data.TELEGRAM_ENABLED,
              DHAN_ENV: data.DHAN_ENV,
              NO_TRADE_TODAY: data.NO_TRADE_TODAY,
              AUTO_PREMIUM_SL: data.AUTO_PREMIUM_SL,
              MAX_DAILY_TRADES: data.MAX_DAILY_TRADES,
              MAX_OPEN_POSITIONS: data.MAX_OPEN_POSITIONS,
              NUMBER_OF_LOTS: data.NUMBER_OF_LOTS,
              LOT_SIZE: data.LOT_SIZE,
              TRADING_CAPITAL: data.TRADING_CAPITAL,
              RISK_MODE: data.RISK_MODE,
              RISK_PERCENT: data.RISK_PERCENT,
              PLANNING_SL_POINTS: data.PLANNING_SL_POINTS,
              PREMIUM_HUGE_CANDLE_1M: data.PREMIUM_HUGE_CANDLE_1M,
              PREMIUM_HUGE_CANDLE_3M: data.PREMIUM_HUGE_CANDLE_3M,
              PREMIUM_HUGE_CANDLE_5M: data.PREMIUM_HUGE_CANDLE_5M,
              PREMIUM_HUGE_CANDLE_15M: data.PREMIUM_HUGE_CANDLE_15M,
              MARKET_BIAS: data.MARKET_BIAS,
            }),
          });

          if (!options.silent) {
            sap.m.MessageToast.show(
              "Config saved. Trading permissions apply immediately.",
            );
          }
          await refreshConfig();
          calculateRisk();
        }

        // Shared helper for start/stop/emergency dashboard actions.
        async function postAction(url) {
          const result = await fetch(url, { method: "POST" }).then((r) =>
            r.json(),
          );
          sap.m.MessageToast.show(result.message);

          await refreshConfig();
          await refreshAlgoStatus();
          await refreshNgrokUrl();
          await refreshDhanHealth();
          await refreshDhanTokenCountdown();

          if (url === "/api/start-server" || url === "/api/start-ngrok") {
            setTimeout(async function () {
              await refreshConfig();
              await refreshAlgoStatus();
              await refreshNgrokUrl();
              await refreshDhanHealth();
            }, 3000);
          }
        }

        // Send a manual LONG/SHORT entry/exit signal to the local webhook.
        async function sendTestSignal(signal) {
          const data = model.getData();

          const payload = {
            signal,
            source: "MANUAL_SIGNAL",
            symbol: "NIFTY",
            price:
              Number(String(data.TEST_PRICE || "").replace(/,/g, "")) || 23500,
            time: new Date().toISOString(),
            interval: String(data.TEST_INTERVAL || data.PREMIUM_SL_INTERVAL || "15"),
          };

          const result = await fetch("/api/test-signal", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          }).then((r) => r.json());

          sap.m.MessageToast.show(result.message);
          await refreshAlgoStatus();
          await refreshLogs();
        }

        // Safety button that disables trading and entry permissions together.
        async function emergencyStop() {
          const result = await fetch("/api/emergency-stop", {
            method: "POST",
          }).then((r) => r.json());

          sap.m.MessageToast.show(result.message);

          await refreshConfig();
          await refreshAlgoStatus();
          await refreshNgrokUrl();
        }

        // Compact status tile with text and color driven by model value.
        function createStatusTile(title, path, activeText, inactiveText) {
          return new sap.m.VBox({
            items: [
              new sap.m.Text({ text: title }).addStyleClass("statusTitle"),
	                      new sap.m.ObjectStatus({
                text: {
                  path: path,
                  formatter: function (value) {
                    if (value === "true") return activeText;
                    if (value === "false") return inactiveText || "Off";
                    if (typeof value === "boolean")
                      return value ? activeText : inactiveText || "Stopped";
                    return value || "-";
                  },
                },
                state: {
                  path: path,
                  formatter: function (value) {
                    return value === true || value === "true"
                      ? "Success"
                      : "Error";
                  },
                },
              }),
            ],
          }).addStyleClass("statusTile");
        }

        // Reusable tooltip icon for settings that need explanation.
        function createInfoIcon(infoText, className) {
          return new sap.ui.core.Icon({
            src: "sap-icon://hint",
            tooltip: infoText,
          }).addStyleClass(className || "infoIcon");
        }

        function createLabelWithInfo(label, infoText, className) {
          return new sap.m.HBox({
            alignItems: "Center",
            items: [
              new sap.m.Label({ text: label }).addStyleClass(
                className || "fieldLabel",
              ),
              createInfoIcon(infoText, "permissionInfoIcon"),
            ],
          }).addStyleClass("labelInfoRow");
        }

        // Permission switch tile used for BUY, SELL, and paper/live controls.
        function createPermissionTile(label, onText, offText, path, infoText) {
          return new sap.m.VBox({
            items: [
              new sap.m.HBox({
                alignItems: "Center",
                justifyContent: "Center",
                items: [
                  new sap.m.Label({ text: label }).addStyleClass(
                    "permissionLabel",
                  ),
                  createInfoIcon(infoText, "permissionInfoIcon"),
                ],
              }),
              new sap.m.Switch({
                customTextOn: onText,
                customTextOff: offText,
                state: {
                  path: "/" + path,
                  formatter: function (value) {
                    return value === "true";
                  },
                },
	                change: function (e) {
	                  handlePermissionSwitchChange(path, e.getParameter("state"));
	                },
              }).addStyleClass("permissionSwitch"),
            ],
          }).addStyleClass("permissionTile");
        }

        // Standard numeric input row for larger risk forms.
        function createNumberField(label, path) {
          return new sap.m.VBox({
            items: [
              new sap.m.Label({ text: label }).addStyleClass("fieldLabel"),
              new sap.m.Input({
                value: "/" + path,
                type: "Number",
                width: "220px",
              }).bindProperty("value", "/" + path),
            ],
          }).addStyleClass("riskField");
        }

        // Compact numeric input used in the daily trading plan card.
        function formatIndianNumber(value) {
          const number = Number(String(value ?? "").replace(/,/g, ""));

          if (!Number.isFinite(number)) {
            return value || "";
          }

          return number.toLocaleString("en-IN", {
            maximumFractionDigits: 2,
          });
        }

        function formatIndianWholeNumber(value) {
          const number = Number(String(value ?? "").replace(/,/g, ""));

          if (!Number.isFinite(number)) {
            return value || "";
          }

          return Math.round(number).toLocaleString("en-IN", {
            maximumFractionDigits: 0,
          });
        }

        function createCompactNumberField(
          label,
          path,
          editable = true,
          options = {},
        ) {
          const input = new sap.m.Input({
            value: {
              path: "/" + path,
              formatter: options.formatIndian ? formatIndianNumber : undefined,
            },
            type: options.formatIndian ? "Text" : "Number",
            editable,
            width: "145px",
            liveChange: function (e) {
              model.setProperty(
                "/" + path,
                String(e.getParameter("value")).replace(/,/g, ""),
              );
              calculateRisk();
            },
            change: async function (e) {
              const value = String(e.getParameter("value")).replace(/,/g, "");

              model.setProperty("/" + path, value);

              if (options.formatIndian) {
                input.setValue(formatIndianNumber(value));
              }

        // Frontend copy of the lot sizing math for quick planning.
        function calculateRisk() {
          const data = model.getData();

          const capital = Number(data.TRADING_CAPITAL || 0);
          const riskPercent = Number(data.RISK_PERCENT || 1);
          const sl = Number(data.PLANNING_SL_POINTS || 0);
          const lotSize = Number(data.LOT_SIZE || 65);
          const maxTrades = Number(data.MAX_DAILY_TRADES || 1);

          const riskAmount = (capital * riskPercent) / 100;
          const lossPerLot = sl * lotSize;
          const actualRisk = lossPerLot * maxTrades;

          let lots = 0;

          if (lossPerLot > 0) {
            lots = Math.floor(riskAmount / lossPerLot);

            if (data.RISK_MODE === "PER_DAY") {
              lots = Math.floor(lots / maxTrades);
            }
          }

          let longLots = lots;
          let shortLots = lots;

          if (data.MARKET_BIAS === "BULLISH") {
            shortLots = lots > 1 ? Math.max(1, Math.floor(lots / 2)) : lots;
          }

          if (data.MARKET_BIAS === "BEARISH") {
            longLots = lots > 1 ? Math.max(1, Math.floor(lots / 2)) : lots;
          }

          model.setProperty("/CALC_RISK_AMOUNT", riskAmount);
          model.setProperty("/CALC_LOSS_PER_LOT", lossPerLot);
          model.setProperty("/CALC_ACTUAL_RISK", actualRisk);
          model.setProperty("/CALC_LONG_LOTS", longLots);
          model.setProperty("/CALC_SHORT_LOTS", shortLots);
        }

                      createPlanningMetricTile(
                        "Actual Risk",
                        "CALC_ACTUAL_RISK",
                        "planningInlineMetricTile",
                      ),
                    ],
                  }).addStyleClass("planningMetricStack"),
                ],
              }).addStyleClass("planningRiskLayout"),

              new sap.m.VBox({
                items: [
                  new sap.m.HBox({
                    alignItems: "End",
                    items: [
                      new sap.m.VBox({
                        items: [
                          createLabelWithInfo(
                            "Risk Mode",
                            "Per Trade applies risk to each planned trade. Per Day divides the risk budget across max daily trades.",
                          ),

                          new sap.m.SegmentedButton({
                            selectedKey: "{/RISK_MODE}",
                            width: "240px",
                            selectionChange: async function (e) {
                              const item = e.getParameter("item");

                              model.setProperty(
                                "/RISK_MODE",
                                item
                                  ? item.getKey()
                                  : e.getSource().getSelectedKey(),
                              );
                              calculateRisk();
                              await saveConfig({ silent: true });
                            },
                            items: [
                              new sap.m.SegmentedButtonItem({
                                text: "Per Trade",
                                key: "PER_TRADE",
                                width: "120px",
                              }),
                              new sap.m.SegmentedButtonItem({
                                text: "Per Day",
                                key: "PER_DAY",
                                width: "120px",
                              }),
                            ],
                          }),
                        ],
                      }),

                      new sap.m.VBox({
                        items: [
                          createLabelWithInfo(
                            "Market Bias",
                            "Bias reduces suggested lots for counter-bias trades. Bullish reduces SHORT lots; Bearish reduces LONG lots.",
                          ),

                          new sap.m.SegmentedButton({
                            selectedKey: "{/MARKET_BIAS}",
                            width: "300px",
                            selectionChange: async function (e) {
                              const item = e.getParameter("item");

                              model.setProperty(
                                "/MARKET_BIAS",
                                item
                                  ? item.getKey()
                                  : e.getSource().getSelectedKey(),
                              );
                              calculateRisk();
                              await saveConfig({ silent: true });
                            },
                            items: [
                              new sap.m.SegmentedButtonItem({
                                text: "Bullish",
                                key: "BULLISH",
                                width: "100px",
                              }),
                              new sap.m.SegmentedButtonItem({
                                text: "Neutral",
                                key: "NEUTRAL",
                                width: "100px",
                              }),
                              new sap.m.SegmentedButtonItem({
                                text: "Bearish",
                                key: "BEARISH",
                                width: "100px",
                              }),
                            ],
                          }).addStyleClass("marketBiasSegmentedButton"),
                        ],
                      }),
                    ],
                  }).addStyleClass("planningModeFieldsRow"),
                ],
              }).addStyleClass("planningCalcGroup planningModeBox"),

              new sap.m.HBox({
                items: [
                  createPlanningMetricTile(
                    "LONG Lots",
                    "CALC_LONG_LOTS",
                    "planningKeyMetricTile",
                  ),
                  createPlanningMetricTile(
                    "SHORT Lots",
                    "CALC_SHORT_LOTS",
                    "planningKeyMetricTile",
                  ),
                ],
              }).addStyleClass("planningKeyMetricsRow"),

              new sap.m.VBox({
                items: [
                  new sap.m.Text({
                    text: "Auto Premium SL — Huge Candle Thresholds",
                  }).addStyleClass("planningGroupTitle"),

                  new sap.m.HBox({
                    items: [
                      createCompactNumberField(
                        "1 Minute",
                        "PREMIUM_HUGE_CANDLE_1M",
                      ),
                      createCompactNumberField(
                        "3 Minutes",
                        "PREMIUM_HUGE_CANDLE_3M",
                      ),
                      createCompactNumberField(
                        "5 Minutes",
                        "PREMIUM_HUGE_CANDLE_5M",
                      ),
                      createCompactNumberField(
                        "15 Minutes",
                        "PREMIUM_HUGE_CANDLE_15M",
                      ),
                    ],
                  }).addStyleClass(
                    "planningFieldsRow premiumThresholdFieldsRow",
                  ),

                  new sap.m.Text({
                    text: "When a completed premium candle exceeds its interval threshold, the SL trigger moves to the candle midpoint.",
                  }).addStyleClass("planningHelperText"),
                ],
              }).addStyleClass("planningCalcGroup premiumThresholdGroup"),

            ],
          }).addStyleClass("card");
        }

        // Log viewer card. The API returns recent entries first.
        function monitoringCard() {
          return new sap.m.VBox({
            items: [
              new sap.m.Title({
                text: "Activity Logs",
                level: "H3",
              }).addStyleClass("sectionTitle"),

              new sap.m.HBox({
                items: [
                  new sap.m.CheckBox({
                    text: "TradingView",
                    selected: "{/SHOW_TRADINGVIEW_SIGNAL_LOGS}",
                    select: updateLogFilters,
                  }),

                  new sap.m.CheckBox({
                    text: "Manual",
                    selected: "{/SHOW_MANUAL_SIGNAL_LOGS}",
                    select: updateLogFilters,
                  }),

                  new sap.m.CheckBox({
                    text: "Paper trades",
                    selected: "{/SHOW_PAPER_TRADE_LOGS}",
                    select: updateLogFilters,
                  }),

                  new sap.m.CheckBox({
                    text: "Ignored",
                    selected: "{/SHOW_IGNORED_SIGNAL_LOGS}",
                    select: updateLogFilters,
                  }),

                  new sap.m.CheckBox({
                    text: "Readiness",
                    selected: "{/SHOW_READINESS_LOGS}",
                    select: updateLogFilters,
                  }),

                  new sap.m.CheckBox({
                    text: "Detailed",
                    selected: "{/SHOW_DETAILED_SIGNAL_LOGS}",
                    select: updateLogFilters,
                  }),

                  new sap.m.Button({
                    icon: "sap-icon://refresh",
                    tooltip: "Refresh Logs",
                    type: "Transparent",
                    press: refreshLogs,
                  }),

                  new sap.m.Button({
                    icon: "sap-icon://copy",
                    tooltip: "Copy Log",
                    type: "Transparent",
                    press: copyDisplayedLogs,
                  }),
                ],
              }).addStyleClass("logFilterRow"),

              new sap.m.TextArea({
                value: "{/LIVE_LOGS}",
                rows: 18,
                width: "100%",
                editable: false,
              }).addStyleClass("activityLogTextArea"),

            ],
          }).addStyleClass("card");
        }

        // Manual signal sender. In live mode, these buttons can place real orders.
        function testCenterCard() {
          return new sap.m.VBox({
            items: [
              new sap.m.Title({
                text: "Manual Signal Center",
                level: "H3",
              }).addStyleClass("sectionTitle"),

              new sap.m.MessageStrip({
                text: "These buttons send webhook signals into the bot. Paper Trade ON simulates orders; Paper Trade OFF sends orders to the selected Dhan environment.",
                type: "Warning",
                showIcon: true,
              }).addStyleClass("sapUiSmallMarginBottom"),

              new sap.m.HBox({
                alignItems: "Center",
                items: [
                  createLabelWithInfo(
                    "NIFTY Spot",
                    "Fetched from Dhan LTP when this tab is opened. The bot uses this spot price to round and select the nearest ATM option contract for manual entry signals.",
                    "webhookLabel",
                  ),

                  new sap.m.Input({
                    value: "{/TEST_PRICE}",
                    type: "Text",
                    width: "160px",
                    placeholder: "23,500",
                  }),

                  new sap.m.Button({
                    icon: "sap-icon://refresh",
                    tooltip: "Refresh NIFTY spot from Dhan",
                    type: "Transparent",
                    press: refreshNiftySpotPrice,
                    enabled: {
                      path: "/NIFTY_SPOT_LOADING",
                      formatter: (v) => !v,
                    },
                  }),
                ],
              }).addStyleClass("webhookBox"),

              new sap.m.Text({
                text: {
                  parts: [
                    { path: "/NIFTY_SPOT_ERROR" },
                    { path: "/NIFTY_SPOT_LTP" },
                    { path: "/NIFTY_SPOT_CHECKED_AT" },
                  ],
                  formatter: function (error, ltp, checkedAt) {
                    if (error) return error;
                    if (!ltp) return "NIFTY spot will load when this tab opens.";

                    const checkedText = checkedAt
                      ? new Date(checkedAt).toLocaleString("en-IN", {
                          timeZone: "Asia/Kolkata",
                          hour12: true,
                        })
                      : "-";

                    return `Fetched from Dhan: ${formatIndianWholeNumber(
                      ltp,
                    )} at ${checkedText}`;
                  },
                },
              }).addStyleClass("manualSpotStatus"),

              new sap.m.HBox({
                alignItems: "Center",
                items: [
                  createLabelWithInfo(
                    "Signal Timeframe",
                    "Used to select the previous completed option-premium candle for stop-loss planning.",
                    "webhookLabel",
                  ),

                  new sap.m.SegmentedButton({
                    selectedKey: "{/TEST_INTERVAL}",
                    width: "360px",
                    items: [
                      new sap.m.SegmentedButtonItem({
                        key: "1",
                        text: "1 Min",
                        width: "90px",
                      }),
                      new sap.m.SegmentedButtonItem({
                        key: "3",
                        text: "3 Min",
                        width: "90px",
                      }),
                      new sap.m.SegmentedButtonItem({
                        key: "5",
                        text: "5 Min",
                        width: "90px",
                      }),
                      new sap.m.SegmentedButtonItem({
                        key: "15",
                        text: "15 Min",
                        width: "90px",
                      }),
                    ],
                  }),
                ],
              }).addStyleClass("webhookBox"),

              new sap.m.HBox({
                items: [
                  new sap.m.Button({
                    text: "LONG ENTRY",
                    type: "Accept",
                    press: () => sendTestSignal("LONG_ENTRY"),
                  }),

                  new sap.m.Button({
                    text: "LONG EXIT",
                    press: () => sendTestSignal("LONG_EXIT"),
                  }),

                  new sap.m.Button({
                    text: "SHORT ENTRY",
                    type: "Reject",
                    press: () => sendTestSignal("SHORT_ENTRY"),
                  }),

                  new sap.m.Button({
                    text: "SHORT EXIT",
                    press: () => sendTestSignal("SHORT_EXIT"),
                  }),

                  new sap.m.Button({
                    text: "UNKNOWN",
                    press: () => sendTestSignal("RANDOM_SIGNAL"),
                  }),
                ],
              }).addStyleClass("buttonRow"),
            ],
          }).addStyleClass("card");
        }

        // Assemble the dashboard page and group cards into tabs.
        cockpitTabs = new sap.m.IconTabBar({
          expanded: true,
          select: function (e) {
            const selectedKey = e.getParameter("key");

            if (selectedKey === "planning") {
              calculateRisk();
            }

            if (selectedKey === "manualSignals") {
              refreshNiftySpotPrice();
            }
          },
          items: [
            new sap.m.IconTabFilter({
              key: "tradingDesk",
              text: "Trading Desk",
              icon: "sap-icon://monitor-payments",
              content: [
                liveTradingStatusCard(),
                readinessCenterCard(),
                tradingPermissionsCard(),
                telegramCard(),
              ],
            }),

            new sap.m.IconTabFilter({
              key: "planning",
              text: "Planning",
              icon: "sap-icon://business-objects-experience",
              content: [planningCard()],
            }),

            new sap.m.IconTabFilter({
              key: "manualSignals",
              text: "Manual Signals",
              icon: "sap-icon://action",
              content: [testCenterCard()],
            }),

            new sap.m.IconTabFilter({
              key: "monitoring",
              text: "Monitoring",
              icon: "sap-icon://activity-items",
              content: [monitoringCard()],
            }),
          ],
        }).addStyleClass("cockpitTabs");

        const page = new sap.m.Page({
          title: "IC Algo Bot Control Center",
          showHeader: false,
          content: [
            new sap.m.VBox({
              items: [
                new sap.m.HBox({
                  alignItems: "Center",
                  items: [
                    new sap.m.Avatar({
                      src: "images/ic-algo-bot.jpg",
                      displaySize: "XL",
                      displayShape: "Circle",
                    }).addStyleClass("botAvatar"),

                    new sap.m.VBox({
                      items: [
                        new sap.m.Title({
                          text: "Nikhil Algo Trading Cockpit",
                          level: "H2",
                        }).addStyleClass("heroTitle"),

                        new sap.m.Text({
                          text: "Inside Candle Strategy Automation • Risk Management • Broker Monitoring",
                        }).addStyleClass("heroText"),
                      ],
                    }),
                  ],
                }).addStyleClass("heroCard"),

                cockpitTabs,
              ],
            }).addStyleClass("dashboardShell"),
          ],
        });

        // Initial data load before the app is placed on screen.
        await refreshConfig();
        await refreshAlgoStatus();
        await refreshNgrokUrl();
        await refreshNetworkIp();
        await refreshLogs();
        await refreshDhanHealth();

        // Keep operational status fresh while the dashboard stays open.
        setInterval(refreshAlgoStatus, 5000);
        setInterval(refreshNgrokUrl, 5000);
        setInterval(refreshNetworkIp, 5000);
        setInterval(refreshLogs, 5000);
        setInterval(refreshDhanHealth, 60000);
        setInterval(() => {
          model.setProperty("/TOKEN_COUNTDOWN_TICK", Date.now());
        }, 60000);

        // Render the OpenUI5 app into the body placeholder.
        new sap.m.App({ pages: [page] }).placeAt("content");
      });
    </script>
  </head>

  <body class="sapUiBody" id="content"></body>
</html>
