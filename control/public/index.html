<!doctype html>
<!--
  Local browser dashboard for operating the algo bot.
  It shows bot/broker/ngrok status, edits trading settings, sends test signals,
  updates the Dhan token, and displays recent logs.
  The UI is built with OpenUI5 and talks to control/controlServer.js APIs.
-->
<html>
  <head>
    <meta charset="UTF-8" />
    <title>IC Algo Bot Control Center</title>
    <link rel="icon" type="image/png" href="images/ic-algo-bot-icon.png" />
    <link rel="apple-touch-icon" href="images/ic-algo-bot-icon.png" />
    <link rel="stylesheet" href="style.css" />

    <script
      id="sap-ui-bootstrap"
      src="https://sdk.openui5.org/resources/sap-ui-core.js"
      data-sap-ui-theme="sap_horizon"
      data-sap-ui-libs="sap.m"
      data-sap-ui-async="true"
    ></script>

    <script>
      sap.ui.getCore().attachInit(async function () {
        const LOG_FILTER_STORAGE_KEY = "icAlgoBot.activityLogFilters";
        const ACTIVE_TAB_STORAGE_KEY = "icAlgoBot.activeTab";
        const TOKEN_EXPIRY_WARNING_STORAGE_KEY = "icAlgoBot.dhanTokenExpiryWarning";
        const DHAN_PROFILE_URL = "https://web.dhan.co/index/profile";
        const DEFAULT_ACTIVE_TAB = "tradingDesk";
        const DASHBOARD_TAB_KEYS = [
          "tradingDesk",
          "planning",
          "manualSignals",
          "monitoring",
          "tradingView",
          "analytics",
        ];
        const LOG_FILTER_PATHS = [
          "SHOW_TRADINGVIEW_SIGNAL_LOGS",
          "SHOW_MANUAL_SIGNAL_LOGS",
          "SHOW_PAPER_TRADE_LOGS",
          "SHOW_IGNORED_SIGNAL_LOGS",
          "SHOW_FAILED_SIGNAL_LOGS",
        ];
        const TRAIL_STRATEGY_KEYS = ["CONSERVATIVE", "AGGRESSIVE", "CLASSIC"];
        const TRAIL_DEFAULTS = {
          TRAIL_MODE: "CONSERVATIVE",
          TRAIL_COST_TO_COST_PERCENT: "7",
          TRAIL_CLASSIC_TRIGGER_RR_1: "3",
          TRAIL_CLASSIC_LOCK_RR_1: "1",
          TRAIL_CLASSIC_TRIGGER_RR_2: "5",
          TRAIL_CLASSIC_LOCK_RR_2: "3",
          TRAIL_CLASSIC_TRIGGER_RR_3: "7",
          TRAIL_CLASSIC_LOCK_RR_3: "5",
        };
        const TRADINGVIEW_PAYLOADS = [
          { title: "LONG_ENTRY", signal: "LONG_ENTRY" },
          { title: "SHORT_ENTRY", signal: "SHORT_ENTRY" },
          { title: "LONG_EXIT", signal: "LONG_EXIT" },
          { title: "SHORT_EXIT", signal: "SHORT_EXIT" },
        ].map((item) => ({
          ...item,
          payload: JSON.stringify(
            {
              signal: item.signal,
              symbol: "{{ticker}}",
              price: "{{close}}",
              time: "{{time}}",
              interval: "{{interval}}",
            },
            null,
            2,
          ),
        }));
        const TRADINGVIEW_BASE_TIMEFRAME_FIELD = {
          label: "15 min",
          key: "ALLOW_TV_TIMEFRAME_15M",
          locked: true,
        };
        const TRADINGVIEW_ADDITIONAL_TIMEFRAME_FIELDS = [
          { label: "1 min", key: "ALLOW_TV_TIMEFRAME_1M" },
          { label: "3 min", key: "ALLOW_TV_TIMEFRAME_3M" },
          { label: "5 min", key: "ALLOW_TV_TIMEFRAME_5M" },
          { label: "30 min", key: "ALLOW_TV_TIMEFRAME_30M" },
          { label: "1 hr", key: "ALLOW_TV_TIMEFRAME_60M" },
        ];
        const TRADINGVIEW_TIMEFRAME_FIELDS = [
          ...TRADINGVIEW_ADDITIONAL_TIMEFRAME_FIELDS,
          TRADINGVIEW_BASE_TIMEFRAME_FIELD,
        ];

        function applyTrailDefaults(target) {
          Object.entries(TRAIL_DEFAULTS).forEach(([key, value]) => {
            if (
              target[key] === undefined ||
              target[key] === null ||
              target[key] === ""
            ) {
              target[key] = value;
            }
          });

          if (!TRAIL_STRATEGY_KEYS.includes(target.TRAIL_MODE)) {
            target.TRAIL_MODE = TRAIL_DEFAULTS.TRAIL_MODE;
          }
        }

        function getLocalDateKey(date = new Date()) {
          const year = date.getFullYear();
          const month = String(date.getMonth() + 1).padStart(2, "0");
          const day = String(date.getDate()).padStart(2, "0");

          return `${year}-${month}-${day}`;
        }

        function formatMarketDate(date = new Date()) {
          return date.toLocaleDateString("en-IN", {
            weekday: "long",
            day: "2-digit",
            month: "long",
          });
        }

        function formatExpiryDate(dateKey) {
          if (!dateKey) return "Expiry unavailable";

          return formatMarketDate(new Date(`${dateKey}T12:00:00+05:30`));
        }

        function getDaysUntil(dateKey) {
          if (!dateKey) return null;

          const today = new Date(`${getLocalDateKey()}T00:00:00+05:30`);
          const target = new Date(`${dateKey}T00:00:00+05:30`);
          const days = Math.round((target - today) / 86400000);

          return Number.isFinite(days) ? days : null;
        }

        function formatExpiryDistance(dateKey) {
          const days = getDaysUntil(dateKey);

          if (days === null) return "";
          if (days === 0) return "Expiry today";
          if (days === 1) return "Tomorrow";

          return `${days} days away`;
        }

        function getMarketEventState({ holiday, rbiIntel } = {}) {
          const policyDateKeys = rbiIntel?.policyDateKeys || [];
          const todayKey = getLocalDateKey();
          const tomorrow = new Date(`${todayKey}T12:00:00+05:30`);

          tomorrow.setDate(tomorrow.getDate() + 1);

          const tomorrowKey = getLocalDateKey(tomorrow);

          if (policyDateKeys.includes(todayKey)) {
            return {
              visible: true,
              label: "RBI Policy Today",
              meta: "Do Not Trade",
              severity: "danger",
              emergencyVisible: true,
            };
          }

          if (policyDateKeys.includes(tomorrowKey)) {
            return {
              visible: true,
              label: "RBI Policy Tomorrow",
              meta: "Avoid Trading",
              severity: "danger",
              emergencyVisible: true,
            };
          }

          if (holiday?.date) {
            const daysUntilHoliday = getDaysUntil(holiday.date);

            if (daysUntilHoliday === 0) {
              return {
                visible: true,
                label: "Market Holiday Today",
                meta: holiday.description || "Trading closed",
                severity: "danger",
                emergencyVisible: false,
              };
            }

            if (daysUntilHoliday === 1) {
              return {
                visible: true,
                label: "Market Holiday Tomorrow",
                meta: holiday.description || "Plan around closure",
                severity: "warning",
                emergencyVisible: false,
              };
            }
          }

          return {
            visible: false,
            label: "",
            meta: "",
            severity: "none",
            emergencyVisible: false,
          };
        }

        function setMarketEventState(eventState) {
          model.setProperty("/MARKET_EVENT_VISIBLE", eventState.visible);
          model.setProperty("/MARKET_EVENT_LABEL", eventState.label);
          model.setProperty("/MARKET_EVENT_META", eventState.meta);
          model.setProperty("/MARKET_EVENT_SEVERITY", eventState.severity);
          model.setProperty(
            "/MARKET_EVENT_EMERGENCY_VISIBLE",
            eventState.emergencyVisible,
          );
        }

        function formatIndiaVix(vix) {
          const value = Number(vix?.value);

          if (!Number.isFinite(value)) {
            return {
              label: "India VIX unavailable",
              meta: "NSE check failed",
            };
          }

          const change = Number(vix.changePercent);
          const changeText = Number.isFinite(change)
            ? `${change >= 0 ? "+" : ""}${change.toFixed(2)}%`
            : "";

          return {
            label: `India VIX ${value.toFixed(2)}`,
            meta: changeText || vix.source || "",
          };
        }

        function getDefaultLogFilterPrefs() {
          return {
            SHOW_TRADINGVIEW_SIGNAL_LOGS: true,
            SHOW_MANUAL_SIGNAL_LOGS: true,
            SHOW_PAPER_TRADE_LOGS: true,
            SHOW_IGNORED_SIGNAL_LOGS: false,
            SHOW_FAILED_SIGNAL_LOGS: true,
            SHOW_READINESS_LOGS: false,
            SHOW_DETAILED_SIGNAL_LOGS: false,
          };
        }

        function getDailyLogFilterPrefs() {
          const defaultPrefs = getDefaultLogFilterPrefs();

          try {
            const savedPrefs = JSON.parse(
              localStorage.getItem(LOG_FILTER_STORAGE_KEY) || "null",
            );

            if (savedPrefs?.date === getLocalDateKey() && savedPrefs.filters) {
              return LOG_FILTER_PATHS.reduce((prefs, path) => {
                prefs[path] =
                  typeof savedPrefs.filters[path] === "boolean"
                    ? savedPrefs.filters[path]
                    : defaultPrefs[path];
                return prefs;
              }, {});
            }
          } catch (error) {
            // Ignore malformed local preferences and fall back to today's default.
          }

          return defaultPrefs;
        }

        function applyLogFilterPrefs(target, prefs) {
          const defaultPrefs = getDefaultLogFilterPrefs();

          target.SHOW_READINESS_LOGS = defaultPrefs.SHOW_READINESS_LOGS;
          target.SHOW_DETAILED_SIGNAL_LOGS =
            defaultPrefs.SHOW_DETAILED_SIGNAL_LOGS;

          LOG_FILTER_PATHS.forEach((path) => {
            target[path] = prefs[path] === true;
          });
        }

        function getSavedActiveTab() {
          try {
            const savedTab = localStorage.getItem(ACTIVE_TAB_STORAGE_KEY);

            return DASHBOARD_TAB_KEYS.includes(savedTab)
              ? savedTab
              : DEFAULT_ACTIVE_TAB;
          } catch (error) {
            return DEFAULT_ACTIVE_TAB;
          }
        }

        function saveActiveTab(tabKey) {
          if (!DASHBOARD_TAB_KEYS.includes(tabKey)) return;

          try {
            localStorage.setItem(ACTIVE_TAB_STORAGE_KEY, tabKey);
          } catch (error) {
            // Ignore storage failures; tab persistence is only a convenience.
          }
        }

        // Load dashboard config first; it becomes the single UI model.
        const config = await fetch("/api/config").then((r) => r.json());
        applyTrailDefaults(config);
        applyLogFilterPrefs(config, getDailyLogFilterPrefs());
        config.algoLiveStatus = {};
        config.ngrokUrl = config.ngrokUrl || "";
        config.dhanHealth = null;
        config.RAW_LOGS = "";
        config.LIVE_LOGS = "";
        config.MARKET_TODAY_LABEL = formatMarketDate();
        config.NIFTY_NEXT_EXPIRY_LABEL = "Loading expiry...";
        config.NIFTY_NEXT_EXPIRY_META = "";
        config.BANKNIFTY_NEXT_EXPIRY_LABEL = "Loading expiry...";
        config.BANKNIFTY_NEXT_EXPIRY_META = "";
        config.EXPIRY_RISK_REDUCTION_ACTIVE = false;
        config.EXPIRY_RISK_REDUCTION_TEXT = "";
        config.CALC_EFFECTIVE_RISK_PERCENT = Number(config.RISK_PERCENT || 1);
        config.NSE_NEXT_HOLIDAY_LABEL = "Loading holiday...";
        config.NSE_NEXT_HOLIDAY_META = "";
        config.RBI_MARKET_LABEL = "Loading RBI...";
        config.RBI_MARKET_META = "";
        config.MARKET_EVENT_VISIBLE = false;
        config.MARKET_EVENT_LABEL = "";
        config.MARKET_EVENT_META = "";
        config.MARKET_EVENT_SEVERITY = "none";
        config.MARKET_EVENT_EMERGENCY_VISIBLE = false;
        config.INDIA_VIX_LABEL = "India VIX loading...";
        config.INDIA_VIX_META = "";
        config.TEST_INTERVAL = config.PREMIUM_SL_INTERVAL || "15";
        config.NIFTY_SPOT_LOADING = false;
        config.NIFTY_SPOT_ERROR = "";
        config.TRAIL_TRIGGER_PRICE = "";
        config.TRAIL_LIMIT_PRICE = "";
        config.TOKEN_COUNTDOWN_TICK = Date.now();
        config.NETWORK_PUBLIC_IP = "";
        config.NETWORK_LOCAL_IPS = [];
        config.NETWORK_IP_ERROR = "";
        config.ANALYTICS_PERIOD = "week";
        config.ANALYTICS_PERIOD_OFFSET = 0;
        config.ANALYTICS_UNDERLYING = "ALL";
        config.ANALYTICS_OPTION_TYPE = "ALL";
        config.ANALYTICS_INCLUDE_TEST_DATA = false;
        config.ANALYTICS_TRADE_OUTCOME_FILTER = "ALL";
        config.ANALYTICS_TRADE_PAGE = 1;
        config.ANALYTICS_TRADE_PAGE_SIZE = 15;
        config.ANALYTICS_TRADE_PAGE_COUNT = 1;
        config.ANALYTICS_TRADE_TOTAL_ROWS = 0;
        config.ANALYTICS_TRADE_PAGE_LABEL = "Page 1 of 1";
        config.ANALYTICS_TRADE_CAN_PREV = false;
        config.ANALYTICS_TRADE_CAN_NEXT = false;
        config.analyticsTradeTableRows = [];
        config.tradeAnalytics = null;

        const model = new sap.ui.model.json.JSONModel(config);
        sap.ui.getCore().setModel(model);
        let cockpitTabs = null;
        let lastTradingViewWebhookKey = null;
        let webhookBaselineLoaded = false;
        let activeWebhookDialog = null;
        let lastSavedDhanEnvironment = config.DHAN_ENV || "LIVE";
        let dhanHealthRequestSequence = 0;
        let pendingConfigSaveTimer = null;
        let activePremiumHugeCandleUnderlying = normalizeUnderlyingSymbol(
          config.UNDERLYING_SYMBOL,
        );

        // Refresh .env-backed config while preserving transient UI-only values.
        async function refreshConfig() {
          const fresh = await fetch("/api/config").then((r) => r.json());
          const currentData = model.getData();

          fresh.algoLiveStatus = currentData.algoLiveStatus || {};
          fresh.ngrokUrl = fresh.ngrokUrl || currentData.ngrokUrl || "";
          fresh.dhanHealth = currentData.dhanHealth || null;
          fresh.RAW_LOGS = currentData.RAW_LOGS || "";
          fresh.LIVE_LOGS = currentData.LIVE_LOGS || "";
          applyLogFilterPrefs(fresh, currentData);
          fresh.MARKET_TODAY_LABEL = currentData.MARKET_TODAY_LABEL;
          fresh.NIFTY_NEXT_EXPIRY_LABEL = currentData.NIFTY_NEXT_EXPIRY_LABEL;
          fresh.NIFTY_NEXT_EXPIRY_META = currentData.NIFTY_NEXT_EXPIRY_META;
          fresh.BANKNIFTY_NEXT_EXPIRY_LABEL =
            currentData.BANKNIFTY_NEXT_EXPIRY_LABEL;
          fresh.BANKNIFTY_NEXT_EXPIRY_META =
            currentData.BANKNIFTY_NEXT_EXPIRY_META;
          fresh.EXPIRY_RISK_REDUCTION_ACTIVE =
            currentData.EXPIRY_RISK_REDUCTION_ACTIVE || false;
          fresh.EXPIRY_RISK_REDUCTION_TEXT =
            currentData.EXPIRY_RISK_REDUCTION_TEXT || "";
          fresh.CALC_EFFECTIVE_RISK_PERCENT =
            currentData.CALC_EFFECTIVE_RISK_PERCENT ||
            Number(fresh.RISK_PERCENT || 1);
          fresh.NSE_NEXT_HOLIDAY_LABEL = currentData.NSE_NEXT_HOLIDAY_LABEL;
          fresh.NSE_NEXT_HOLIDAY_META = currentData.NSE_NEXT_HOLIDAY_META;
          fresh.RBI_MARKET_LABEL = currentData.RBI_MARKET_LABEL;
          fresh.RBI_MARKET_META = currentData.RBI_MARKET_META;
          fresh.MARKET_EVENT_VISIBLE = currentData.MARKET_EVENT_VISIBLE;
          fresh.MARKET_EVENT_LABEL = currentData.MARKET_EVENT_LABEL;
          fresh.MARKET_EVENT_META = currentData.MARKET_EVENT_META;
          fresh.MARKET_EVENT_SEVERITY = currentData.MARKET_EVENT_SEVERITY;
          fresh.MARKET_EVENT_EMERGENCY_VISIBLE =
            currentData.MARKET_EVENT_EMERGENCY_VISIBLE;
          fresh.INDIA_VIX_LABEL = currentData.INDIA_VIX_LABEL;
          fresh.INDIA_VIX_META = currentData.INDIA_VIX_META;
          fresh.TEST_PRICE = currentData.TEST_PRICE || "";
          fresh.TEST_INTERVAL =
            currentData.TEST_INTERVAL || fresh.PREMIUM_SL_INTERVAL || "15";
          fresh.NIFTY_SPOT_LTP = currentData.NIFTY_SPOT_LTP;
          fresh.NIFTY_SPOT_CHECKED_AT = currentData.NIFTY_SPOT_CHECKED_AT;
          fresh.NIFTY_SPOT_LOADING = currentData.NIFTY_SPOT_LOADING || false;
          fresh.NIFTY_SPOT_ERROR = currentData.NIFTY_SPOT_ERROR || "";
          Object.keys(TRAIL_DEFAULTS).forEach((key) => {
            if (
              (fresh[key] === undefined ||
                fresh[key] === null ||
                fresh[key] === "") &&
              currentData[key] !== undefined &&
              currentData[key] !== null &&
              currentData[key] !== ""
            ) {
              fresh[key] = currentData[key];
            }
          });
          applyTrailDefaults(fresh);
          fresh.TRAIL_TRIGGER_PRICE = currentData.TRAIL_TRIGGER_PRICE || "";
          fresh.TRAIL_LIMIT_PRICE = currentData.TRAIL_LIMIT_PRICE || "";
          fresh.CALC_RISK_AMOUNT = currentData.CALC_RISK_AMOUNT;
          fresh.CALC_LOSS_PER_LOT = currentData.CALC_LOSS_PER_LOT;
          fresh.CALC_ACTUAL_RISK = currentData.CALC_ACTUAL_RISK;
          fresh.CALC_LONG_LOTS = currentData.CALC_LONG_LOTS;
          fresh.CALC_SHORT_LOTS = currentData.CALC_SHORT_LOTS;
          fresh.TOKEN_COUNTDOWN_TICK =
            currentData.TOKEN_COUNTDOWN_TICK || Date.now();
          fresh.NETWORK_PUBLIC_IP = currentData.NETWORK_PUBLIC_IP || "";
          fresh.NETWORK_LOCAL_IPS = currentData.NETWORK_LOCAL_IPS || [];
          fresh.NETWORK_IP_ERROR = currentData.NETWORK_IP_ERROR || "";
          fresh.ANALYTICS_PERIOD = currentData.ANALYTICS_PERIOD || "week";
          fresh.ANALYTICS_PERIOD_OFFSET =
            Number(currentData.ANALYTICS_PERIOD_OFFSET || 0);
          fresh.ANALYTICS_UNDERLYING =
            currentData.ANALYTICS_UNDERLYING || "ALL";
          fresh.ANALYTICS_OPTION_TYPE =
            currentData.ANALYTICS_OPTION_TYPE || "ALL";
          fresh.ANALYTICS_INCLUDE_TEST_DATA =
            currentData.ANALYTICS_INCLUDE_TEST_DATA === true;
          fresh.ANALYTICS_TRADE_OUTCOME_FILTER =
            currentData.ANALYTICS_TRADE_OUTCOME_FILTER || "ALL";
          fresh.ANALYTICS_TRADE_PAGE = currentData.ANALYTICS_TRADE_PAGE || 1;
          fresh.ANALYTICS_TRADE_PAGE_SIZE =
            currentData.ANALYTICS_TRADE_PAGE_SIZE || 15;
          fresh.ANALYTICS_TRADE_PAGE_COUNT =
            currentData.ANALYTICS_TRADE_PAGE_COUNT || 1;
          fresh.ANALYTICS_TRADE_TOTAL_ROWS =
            currentData.ANALYTICS_TRADE_TOTAL_ROWS || 0;
          fresh.ANALYTICS_TRADE_PAGE_LABEL =
            currentData.ANALYTICS_TRADE_PAGE_LABEL || "Page 1 of 1";
          fresh.ANALYTICS_TRADE_CAN_PREV =
            currentData.ANALYTICS_TRADE_CAN_PREV || false;
          fresh.ANALYTICS_TRADE_CAN_NEXT =
            currentData.ANALYTICS_TRADE_CAN_NEXT || false;
          fresh.analyticsTradeTableRows =
            currentData.analyticsTradeTableRows || [];
          fresh.tradeAnalytics = currentData.tradeAnalytics || null;

          model.setData(fresh);
          maybeShowDhanTokenExpiryWarning();
          activePremiumHugeCandleUnderlying = normalizeUnderlyingSymbol(
            fresh.UNDERLYING_SYMBOL,
          );
          calculateRisk();
        }

        // Pull live position and last-signal state from the algo server.
        async function refreshAlgoStatus() {
          try {
            const selectedPaperTrade = model.getProperty("/PAPER_TRADE");
            const query =
              selectedPaperTrade === "true" || selectedPaperTrade === "false"
                ? `?paperTrade=${encodeURIComponent(selectedPaperTrade)}`
                : "";
            const status = await fetch(`/api/algo-status${query}`).then((r) =>
              r.json(),
            );
            model.setProperty("/algoLiveStatus", status);
            if (
              status.underlyingSymbol &&
              status.underlyingSymbol !== model.getProperty("/UNDERLYING_SYMBOL")
            ) {
              const syncedUnderlying = normalizeUnderlyingSymbol(status.underlyingSymbol);

              applyUnderlyingDefaults(
                syncedUnderlying,
                activePremiumHugeCandleUnderlying,
              );
              model.setProperty(
                "/UNDERLYING_DISPLAY_NAME",
                status.underlyingDisplayName || syncedUnderlying,
              );
            }
          } catch (error) {
            model.setProperty("/algoLiveStatus", {
              running: false,
              currentPosition: null,
              lastSignal: "",
              lastSignalTime: "",
              lastTrades: [],
              message: "Algo server not reachable",
            });
          }
        }

        // Refresh the public TradingView webhook URL exposed by ngrok.
        async function refreshNgrokUrl() {
          try {
            const result = await fetch("/api/ngrok-url").then((r) => r.json());

            model.setProperty("/ngrokRunning", !!result.running);
            model.setProperty("/ngrokUrl", result.url || "");
          } catch (error) {
            model.setProperty("/ngrokRunning", false);
            model.setProperty("/ngrokUrl", "");
          }
        }

        async function refreshNetworkIp() {
          try {
            const result = await fetch("/api/network-ip").then((r) => r.json());

            model.setProperty("/NETWORK_PUBLIC_IP", result.publicIp || "");
            model.setProperty("/NETWORK_LOCAL_IPS", result.localIps || []);
            model.setProperty("/NETWORK_IP_ERROR", result.error || "");
          } catch (error) {
            model.setProperty("/NETWORK_PUBLIC_IP", "");
            model.setProperty("/NETWORK_LOCAL_IPS", []);
            model.setProperty("/NETWORK_IP_ERROR", "Public IP unavailable");
          }
        }

        async function copyTextToClipboard(value, successMessage, emptyMessage) {
          const text = String(value || "").trim();

          if (!text) {
            sap.m.MessageToast.show(emptyMessage || "Nothing to copy");
            return;
          }

          try {
            await navigator.clipboard.writeText(text);
            sap.m.MessageToast.show(successMessage || "Copied");
          } catch (error) {
            sap.m.MessageToast.show("Unable to copy");
          }
        }

        function downloadTradingViewIndicatorCode() {
          window.location.href = "/api/tradingview-indicator";
          sap.m.MessageToast.show("TradingView indicator code downloaded");
        }

        async function refreshTradeAnalytics() {
          try {
            const period = model.getProperty("/ANALYTICS_PERIOD") || "week";
            const offset = Number(
              model.getProperty("/ANALYTICS_PERIOD_OFFSET") || 0,
            );
            const underlying =
              model.getProperty("/ANALYTICS_UNDERLYING") || "ALL";
            const optionType =
              model.getProperty("/ANALYTICS_OPTION_TYPE") || "ALL";
            const includeTestData =
              model.getProperty("/ANALYTICS_INCLUDE_TEST_DATA") === true;
            const result = await fetch(
              `/api/trade-analytics?period=${encodeURIComponent(period)}&offset=${encodeURIComponent(offset)}&underlying=${encodeURIComponent(underlying)}&optionType=${encodeURIComponent(optionType)}&includeTestData=${encodeURIComponent(includeTestData)}`,
            ).then((r) => r.json());

            model.setProperty("/tradeAnalytics", result.analytics || null);
            model.setProperty(
              "/ANALYTICS_PERIOD_OFFSET",
              Number(result.analytics?.periodOffset || 0),
            );
            model.setProperty("/ANALYTICS_TRADE_PAGE", 1);
            updateAnalyticsTradeTableState();
          } catch (error) {
            model.setProperty("/tradeAnalytics", null);
            updateAnalyticsTradeTableState();
          }
        }

        function getAnalyticsTradeOutcome(row) {
          const value = Number(row?.value);

          if (row?.outcome === "WIN" || value > 0) return "PROFIT";
          if (row?.outcome === "LOSS" || value < 0) return "LOSS";
          return "BREAKEVEN";
        }

        function updateAnalyticsTradeTableState() {
          const pageSize = 15;
          const rows = Array.isArray(
            model.getProperty("/tradeAnalytics/charts/pnlByTrade"),
          )
            ? model.getProperty("/tradeAnalytics/charts/pnlByTrade")
            : [];
          const filter =
            model.getProperty("/ANALYTICS_TRADE_OUTCOME_FILTER") || "ALL";
          const filteredRows =
            filter === "ALL"
              ? rows
              : rows.filter((row) => getAnalyticsTradeOutcome(row) === filter);
          const pageCount = Math.max(1, Math.ceil(filteredRows.length / pageSize));
          const requestedPage = Number(model.getProperty("/ANALYTICS_TRADE_PAGE") || 1);
          const page = Math.min(Math.max(requestedPage, 1), pageCount);
          const startIndex = (page - 1) * pageSize;
          const pageRows = filteredRows
            .slice(startIndex, startIndex + pageSize)
            .map((row) => ({
              ...row,
              outcomeLabel:
                row.outcomeLabel ||
                (getAnalyticsTradeOutcome(row) === "PROFIT"
                  ? "Profit"
                  : getAnalyticsTradeOutcome(row) === "LOSS"
                    ? "Loss"
                    : "Breakeven"),
            }));

              : [];

              const item = expiries.find(
                (entry) => entry.underlyingSymbol === symbol,
              );

              if (expiryResult.success && item?.expiry?.date) {
                model.setProperty(labelPath, formatExpiryDate(item.expiry.date));
                model.setProperty(
                  metaPath,
                  formatExpiryDistance(item.expiry.date),
                );
              } else {
                model.setProperty(labelPath, "Expiry unavailable");
                model.setProperty(
                  metaPath,
                  expiryResult.message || "Instrument master check failed",
                );

            };

            setExpiryState(
              "NIFTY",
              "/NIFTY_NEXT_EXPIRY_LABEL",
              "/NIFTY_NEXT_EXPIRY_META",
            );
            setExpiryState(
              "BANKNIFTY",
              "/BANKNIFTY_NEXT_EXPIRY_LABEL",
              "/BANKNIFTY_NEXT_EXPIRY_META",

              "/BANKNIFTY_NEXT_EXPIRY_LABEL",
              "Expiry unavailable",
            );
            model.setProperty(
              "/BANKNIFTY_NEXT_EXPIRY_META",

          calculateRisk();

          try {

            model.setProperty(
              "/NSE_NEXT_HOLIDAY_META",
              "NSE holiday check failed",

          try {
            const rbiResult = await fetch("/api/rbi-market-intel").then((r) =>
              r.json(),
            );

            const label = intel.latestPolicyEvent || "";

            if (rbiResult.success && label) {
              rbiIntel = intel;
              model.setProperty("/RBI_MARKET_LABEL", label);
              model.setProperty("/RBI_MARKET_META", "RBI policy feed checked");

              model.setProperty("/RBI_MARKET_LABEL", "RBI unavailable");
              model.setProperty(

                rbiResult.message || "RBI current-rates check failed",

            model.setProperty("/RBI_MARKET_LABEL", "RBI unavailable");

        function getDhanTokenRemaining(updatedAt) {
          if (!updatedAt) {
            return null;
          }

          const updated = new Date(updatedAt).getTime();

          const expires = updated + 24 * 60 * 60 * 1000;

          return expires - Date.now();
        }

        // Dhan access tokens are short-lived, so show a simple expiry countdown.
        function getDhanTokenCountdown(updatedAt) {
          const remaining = getDhanTokenRemaining(updatedAt);

          if (remaining === null) {
            return "Token update time missing";
          }

          if (remaining <= 0) {
            return "Token expired";
          }

          const hours = Math.floor(remaining / (1000 * 60 * 60));

          const minutes = Math.floor(
            (remaining % (1000 * 60 * 60)) / (1000 * 60),
          );

          return `Expires in ${hours}h ${minutes}m`;
        }

        function isDhanTokenExpiringSoon(updatedAt) {
          const remaining = getDhanTokenRemaining(updatedAt);

          const expiringSoon =
            remaining !== null && remaining > 0 && remaining < 60 * 60 * 1000;

          return expiringSoon ? "true" : "false";
        }

        function isDhanTokenExpired(updatedAt) {
          const remaining = getDhanTokenRemaining(updatedAt);
          return remaining !== null && remaining <= 0 ? "true" : "false";
        }

        function getTokenExpiryWarningKey(updatedAt) {
          return updatedAt ? String(updatedAt) : "missing";
        }

        function navigateToTradingDesk() {
          if (cockpitTabs) {
            cockpitTabs.setSelectedKey("tradingDesk");

        function openDhanProfile() {
          const opened = window.open(DHAN_PROFILE_URL, "_blank");

        function maybeShowDhanTokenExpiryWarning() {
          const environment = model.getProperty("/DHAN_ENV") || "LIVE";

          if (environment !== "LIVE") return;

          const updatedAt = model.getProperty("/DHAN_TOKEN_UPDATED_AT");
          const remaining = getDhanTokenRemaining(updatedAt);

          if (remaining === null || remaining <= 0 || remaining > 60 * 60 * 1000) {
            return;
          }

          const warningKey = getTokenExpiryWarningKey(updatedAt);
          let previousWarningKey = "";

          try {
            previousWarningKey =
              localStorage.getItem(TOKEN_EXPIRY_WARNING_STORAGE_KEY) || "";
          } catch (error) {
            previousWarningKey = "";
          }

          if (previousWarningKey === warningKey) return;

          try {
            localStorage.setItem(TOKEN_EXPIRY_WARNING_STORAGE_KEY, warningKey);
          } catch (error) {
            // Storage is only used to avoid repeating the same warning.
          }

          const countdown = getDhanTokenCountdown(updatedAt).replace("Expires in ", "");

          sap.ui.require(["sap/m/MessageBox"], function (MessageBox) {
            MessageBox.warning(
              "LIVE Dhan token expires in " +
                countdown +
                ". Update it before the next TradingView signal so live orders do not fail.",
              {
                title: "Dhan Token Expiring Soon",
                actions: ["Take action", MessageBox.Action.CLOSE],
                emphasizedAction: "Take action",
                onClose: function (action) {
                  if (action === "Take action") {
                    navigateToTradingDesk();
                  }
                },
              },
            );
          });
        }

        function isDhanHealthExpiredMessage(message) {
          const normalized = String(message || "").toLowerCase();

          return (
            normalized.includes("token") &&
            (normalized.includes("expired") || normalized.includes("invalid"))
          );
        }

        function isLiveDhanTokenExpired(
          connected,
          environment,
          updatedAt,
          message,
        ) {
          if (environment !== "LIVE") return "false";

          return isDhanTokenExpired(updatedAt) === "true" ||
            (!connected && isDhanHealthExpiredMessage(message))
            ? "true"
            : "false";
        }

        function getDhanDashboardHealthMessage(
          connected,
          environment,
          message,
          liveUpdatedAt,
        ) {
          if (
            isLiveDhanTokenExpired(
              connected,
              environment,
              liveUpdatedAt,
              message,
            ) === "true"
          ) {
            return "Token expired";
          }

          if (!connected) {
            return message || "Connection failed";
          }

          if (environment === "LIVE") {
            return getDhanTokenCountdown(liveUpdatedAt);
          }

          return "";
        }

        function getDhanCredentialStatus(
          environment,
          liveUpdatedAt,
          sandboxConfigured,
        ) {
          if (environment === "SANDBOX") {
            return sandboxConfigured
              ? "Sandbox token configured"
              : "Sandbox token not configured";
          }

          return getDhanTokenCountdown(liveUpdatedAt);
        }

        // Pull recent logs from the backend; the backend already sorts newest-first.
        async function refreshLogs() {
          const result = await fetch("/api/logs").then((r) => r.json());
          const logs = result.logs || "";

          model.setProperty("/RAW_LOGS", logs);
          applyLogFilters();
          notifyLatestTradingViewWebhook(logs);
        }

        function isReadinessLogLine(line) {
          return (
            /LIFECYCLE|Control dashboard|Algo server|Ngrok/i.test(line) &&
            !/MANUAL_SIGNAL/i.test(line)
          );
        }

        function isManualSignalLogLine(line) {
          return /MANUAL_SIGNAL|"source":"MANUAL_SIGNAL"|Test signal sent/i.test(
            line,
          );
        }

        function isSignalLogLine(line) {
          return /Webhook received:|Last Signal Updated:|Execution context:|Selected Option:|Entry sizing:|Position changed to|Position closed|Premium stop-loss hit|Manual SL trail confirmed|Automatic SL trail confirmed|DHAN option SL-Limit modify|Duplicate .*ignored|ignored because|Unknown signal|DHAN .* ERROR|Telegram Error|failed/i.test(
            line,
          );
        }

        function isIgnoredSignalLogLine(line) {
          return /ignored because|Unknown signal|Duplicate .*ignored/i.test(line);
        }

        function isFailedSignalLogLine(line) {
          return /DHAN .* ERROR|(?:LONG_ENTRY|SHORT_ENTRY).*(?:not filled|rejected|failed)|MANUAL_SIGNAL failed(?:\s|:)|premium stop-loss setup failed|Telegram Error/i.test(
            line,
          );
        }

        function getWebhookPayload(line) {
          const match = line.match(/Webhook received: (\{.*\})/);

          if (!match) {
            return null;
          }

          try {
            return JSON.parse(match[1]);
          } catch (error) {
            return null;
          }
        }

        function getLogKeyValue(line, key) {
          const match = String(line || "").match(
            new RegExp(`(?:^|\\s)${key}=([^\\s:]+)`, "i"),
          );

          return match ? match[1] : "";
        }

        function getManualSignalLifecyclePayload(line) {
          if (!/MANUAL_SIGNAL/i.test(line)) {
            return null;
          }

          const signal = getLogKeyValue(line, "signal");

          if (!signal) {
            return null;
          }

          return {
            signal,
            source: getLogKeyValue(line, "source") || "MANUAL_SIGNAL",
            symbol:
              getLogKeyValue(line, "symbol") ||
              model.getProperty("/UNDERLYING_SYMBOL") ||
              "",
            price: getLogKeyValue(line, "price"),
            interval:
              getLogKeyValue(line, "interval") ||
              model.getProperty("/TEST_INTERVAL") ||
              model.getProperty("/PREMIUM_SL_INTERVAL") ||
              "",
          };
        }

        function getManualSignalLifecycleContext(lines) {
          const contextLine = lines.find((line) =>
            /MANUAL_SIGNAL/i.test(line) &&
            (/\btradeMode=/i.test(line) || /\bsignal=/i.test(line)),
          );

          if (!contextLine) {
            return null;
          }

          const currentTradeMode =
            model.getProperty("/PAPER_TRADE") === "true"
              ? "PAPER"
              : String(model.getProperty("/DHAN_ENV") || "LIVE").toUpperCase() ===
                  "SANDBOX"
                ? "SANDBOX"
                : "LIVE";

          return {
            tradeMode: getLogKeyValue(contextLine, "tradeMode") || currentTradeMode,
            orderRoute: "",
            dhanEnvironment: "",
            marketData: "",
            interval:
              getLogKeyValue(contextLine, "interval") ||
              model.getProperty("/TEST_INTERVAL") ||
              model.getProperty("/PREMIUM_SL_INTERVAL") ||
              "",
          };
        }

        function getLatestTradingViewWebhook(logs) {
          const lines = String(logs || "").split("\n");

          for (const line of lines) {
            if (!/Webhook received:/i.test(line)) {
              continue;
            }

            const payload = getWebhookPayload(line);

            if (
              !payload ||
              String(payload.source || "").toUpperCase() === "MANUAL_SIGNAL"
            ) {
              continue;
            }

            return {
              key: [
                payload.signal || "",
                payload.symbol || "",
                payload.time || "",
              ].join("|"),
              payload,
              receivedAt: getLogTimestamp(line),
            };
          }

          return null;
        }

        function notifyLatestTradingViewWebhook(logs) {
          const webhook = getLatestTradingViewWebhook(logs);

          if (!webhook) {
            webhookBaselineLoaded = true;
            return;
          }

          if (!webhookBaselineLoaded) {
            lastTradingViewWebhookKey = webhook.key;
            webhookBaselineLoaded = true;
            return;
          }

          if (webhook.key === lastTradingViewWebhookKey) {
            return;
          }

          lastTradingViewWebhookKey = webhook.key;
          showTradingViewWebhookPopup(webhook);
        }

        function getReadableOption(text) {
          if (!text) return "";

          const selectedMatch = text.match(
            /Selected Option:\s*(\d+)\s+(CE|PE)/i,
          );

          if (selectedMatch) {
            return `${model.getProperty("/UNDERLYING_DISPLAY_NAME") || "NIFTY"} ${selectedMatch[1]} ${selectedMatch[2].toUpperCase()}`;
          }

          const symbolMatch = text.match(
            /(BANKNIFTY|NIFTY).*?(\d{5})\s+(CALL|PUT)/i,
          );

          if (symbolMatch) {
            return `${symbolMatch[1].toUpperCase()} ${symbolMatch[2]} ${
              symbolMatch[3].toUpperCase() === "CALL" ? "CE" : "PE"
            }`;
          }

          return text;
        }

        function getSignalSourceLabel(lines) {
          return lines.some(isManualSignalLogLine) ? "Manual" : "TradingView";
        }

        function getEntrySizingDetails(line) {
          if (!line) {
            return null;
          }

          const getValue = (key) => {
            const match = line.match(new RegExp(`(?:^|\\s)${key}=(\\S+)`, "i"));
            return match ? match[1] : "";
          };

          if (!/Entry sizing:/i.test(line)) {
            return null;
          }

          return {
            source: getValue("source"),
            optionLtp: getValue("premium"),
            premiumSl: getValue("premiumSL"),
            previousCandleLow: getValue("candleLow") || getValue("premiumSL"),
            previousCandleHigh: getValue("candleHigh"),
            previousCandleRange: getValue("candleRange"),
            halfCandle: getValue("halfCandle") === "true",
            hugeThreshold: getValue("hugeThreshold"),
            riskPoints: getValue("riskPoints"),
            lots: getValue("lots"),
            quantity: getValue("quantity"),
          };
        }

        function getExecutionContextDetails(line) {
          if (!line || !/Execution context:/i.test(line)) {
            return null;
          }

          const getValue = (key) => {
            const match = line.match(new RegExp(`${key}=(\\S+)`, "i"));
            return match ? match[1] : "";
          };

          return {
            tradeMode: getValue("tradeMode"),
            orderRoute: getValue("orderRoute"),
            dhanEnvironment: getValue("dhanEnvironment"),
            marketData: getValue("marketData"),
            interval: getValue("interval"),
          };
        }

        function getSignalInterval(lines, signalItem, executionContext) {
          const payloadInterval =
            signalItem?.payload?.interval || signalItem?.payload?.timeframe;

          if (payloadInterval) {
            return String(payloadInterval);
          }

          if (executionContext?.interval) {
            return String(executionContext.interval);
          }

          const premiumSlPlanLine = lines.find((line) =>
            /Premium SL-Limit plan:.*interval=/i.test(line),
          );
          const planMatch = premiumSlPlanLine?.match(/\binterval=(\S+)/i);

          return planMatch ? planMatch[1] : "";
        }

        function getExecutionModeLabel(context) {
          if (!context) return "";
          if (context.tradeMode === "PAPER")
            return "Paper simulation (no Dhan order)";
          if (context.tradeMode === "SANDBOX") return "Real Dhan Sandbox order";
          return "Real Dhan LIVE order";
        }

        const SUMMARY_LOG_LABEL_WIDTH = 18;

        function formatSummaryLine(label, value) {
          return `${label.padEnd(SUMMARY_LOG_LABEL_WIDTH, " ")}: ${value}`;
        }

        function getLogTimestamp(line) {
          const match = line.match(/^(.*?)\s+\[[A-Z]+\]/);
          return match ? match[1] : "";
        }

        function getTimestampSortValue(timestamp) {
          const match = String(timestamp || "").match(
            /^(\d{1,2})\/(\d{1,2})\/(\d{4}),\s+(\d{1,2}):(\d{2}):(\d{2})\s+(am|pm)$/i,
          );

          if (!match) {
            return 0;
          }

          let hour = Number(match[4]);
          const meridiem = match[7].toLowerCase();

          if (meridiem === "pm" && hour !== 12) {
            hour += 12;
          }

          if (meridiem === "am" && hour === 12) {
            hour = 0;
          }

          return new Date(
            Number(match[3]),
            Number(match[2]) - 1,
            Number(match[1]),
            hour,
            Number(match[5]),
            Number(match[6]),
          ).getTime();
        }

        function formatTimestampedSummary(timestamp, summary) {
          return timestamp ? `${timestamp}  : ${summary}` : summary;
        }

        function getReadinessLogParts(line) {
          const match = line.match(/^(.*?)\s+\[[A-Z]+\]\s+LIFECYCLE\s+(.+)$/);

          if (!match) {
            return null;
          }

          return {
            timestamp: match[1],
            message: match[2],
          };
        }

        function formatReadinessSummary(timestamp, message) {
          return `${timestamp}  : ${message}`;
        }

        function getReadinessSummaryMessage(message) {
          if (/Control dashboard started/i.test(message)) {
            return {
              key: "control-started",
              text: "Control dashboard started",
            };
          }

          if (
            /Algo server process exited.*SIGTERM|Algo server received SIGTERM|Algo server stop requested/i.test(
              message,
            )
          ) {
            return { key: "algo-stopped", text: "Algo server stopped" };
          }

          if (
            /Algo server listening on port|Algo server start requested/i.test(
              message,
            )
          ) {
            return { key: "algo-started", text: "Algo server started" };
          }

          if (
            /Ngrok process exited.*SIGTERM|Ngrok stop requested/i.test(message)
          ) {
            return { key: "ngrok-stopped", text: "Ngrok stopped" };
          }

          if (/Ngrok start requested but already running/i.test(message)) {
            return { key: "ngrok-running", text: "Ngrok already running" };
          }

          if (/Ngrok start requested/i.test(message)) {
            return { key: "ngrok-started", text: "Ngrok started" };
          }

          return null;
        }

        function getConciseReadinessItems(lines) {
          const seen = new Set();
          const summaryItems = [];

          lines.forEach((line) => {
            const parts = getReadinessLogParts(line);

            if (!parts) {
              return;
            }

            const summary = getReadinessSummaryMessage(parts.message);

            if (!summary || seen.has(summary.key)) {
              return;
            }

            seen.add(summary.key);
            summaryItems.push({
              sortValue: getTimestampSortValue(parts.timestamp),
              text: formatReadinessSummary(parts.timestamp, summary.text),
            });
          });

          return summaryItems;
        }

        function getFailureReason(line) {
          if (!line) return "";

          const invalidIpMatch = line.match(/"errorMessage":"([^"]+)"/);

          if (invalidIpMatch) {
            return invalidIpMatch[1];
          }

          if (/symbol is not (?:BANKNIFTY|NIFTY)/i.test(line)) {
            const symbolMatch = line.match(
              /not (?:BANKNIFTY|NIFTY):\s*([A-Z0-9]+)/i,
            );
            return symbolMatch
              ? `Symbol is not ${model.getProperty("/UNDERLYING_DISPLAY_NAME") || "NIFTY"} (${symbolMatch[1]})`
              : `Symbol is not ${model.getProperty("/UNDERLYING_DISPLAY_NAME") || "NIFTY"}`;
          }

          if (/Unknown signal/i.test(line)) {
            return "Unknown signal";
          }

          if (/Duplicate .*ignored/i.test(line)) {
            const duplicateSignalMatch = line.match(/Duplicate\s+([A-Z_]+)\s+ignored/i);
            const duplicateSymbolMatch = line.match(/symbol=([A-Z0-9]+)/i);

            if (duplicateSignalMatch) {
              return `Duplicate ${duplicateSignalMatch[1].toUpperCase()} ignored`;
            }

            return duplicateSymbolMatch
              ? `Duplicate ${duplicateSymbolMatch[1].toUpperCase()} signal ignored`
              : "Duplicate signal ignored";
          }

          if (/contract not found/i.test(line)) {
            const symbolMatch = line.match(/symbol=([A-Z0-9]+)/i);
            const priceMatch = line.match(/price=([0-9.]+)/i);
            const strikeMatch = line.match(/strike=([0-9.]+)/i);
            const symbol = symbolMatch?.[1] || "selected symbol";
            const price = priceMatch?.[1];
            const strike = strikeMatch?.[1];

            return [
              `No matching contract for ${symbol}`,
              price ? `spot ${price}` : "",
              strike ? `strike ${strike}` : "",
            ]
              .filter(Boolean)
              .join(", ");
          }

          const noPositionMatch = line.match(
            /(LONG_EXIT|SHORT_EXIT) ignored because no (LONG|SHORT) position is open/i,
          );

          if (noPositionMatch) {
            const currentPositionMatch = line.match(/currentPosition=(LONG|SHORT|NONE)/i);
            const matchingExitMatch = line.match(/matchingExit=(LONG_EXIT|SHORT_EXIT|NONE)/i);

            if (
              currentPositionMatch &&
              currentPositionMatch[1] !== "NONE" &&
              matchingExitMatch &&
              matchingExitMatch[1] !== "NONE"
            ) {
              return `Open position is ${currentPositionMatch[1].toUpperCase()}; use ${matchingExitMatch[1].toUpperCase()}`;
            }

            return `No ${noPositionMatch[2].toUpperCase()} position is open`;
          }

          if (/disabled/i.test(line)) {
            return "Trading permission disabled";
          }

          if (/daily trade limit reached/i.test(line)) {
            return "Daily trade limit reached";
          }

          if (/premium stop-loss setup failed/i.test(line)) {
            const reasonMatch = line.match(
              /premium stop-loss setup failed:\s*reason=(.+?)(?:\s+contract=|\s+securityId=|\s+optionLtp=|\s+premiumSL=|\s+previousCandleLow=|\s+previousCandleHigh=|\s+previousCandleRange=|\s+interval=|$)/i,
            );
            const legacyReasonMatch = line.match(
              /premium stop-loss setup failed:\s*"([^"]+)"/i,
            );

            return (
              reasonMatch?.[1] ||
              legacyReasonMatch?.[1] ||
              "Premium stop-loss setup failed"
            );
          }

          if (/premium stop-loss is active/i.test(line)) {
            return "Premium stop-loss is active";
          }

          if (/calculated quantity is invalid/i.test(line)) {
            return "Invalid quantity";
          }

          if (/Telegram Error/i.test(line)) {
            return "Telegram delivery failed";
          }

          const manualSignalResponseLostMatch = line.match(
            /MANUAL_SIGNAL response lost after processing .*:\s*(.+)$/i,
          );

          if (manualSignalResponseLostMatch) {
            return `Response lost after processing (${manualSignalResponseLostMatch[1]})`;
          }

          const manualSignalFailureMatch = line.match(
            /MANUAL_SIGNAL failed(?:\s+.*?)?:\s*(.+)$/i,
          );

          if (manualSignalFailureMatch) {
            return manualSignalFailureMatch[1];
          }

          const failedMatch = line.match(/\] (.+failed.*)$/i);
          return failedMatch ? failedMatch[1] : "";
        }

        function getConciseSignalItems(lines) {
          const signalLines = lines.filter((line) => !isReadinessLogLine(line));

          if (!signalLines.length) {
            return [];
          }

          const sourceLabel = getSignalSourceLabel(signalLines);
          const payloadItems = signalLines
            .map((line) => ({ line, payload: getWebhookPayload(line) }))
            .filter((item) => item.payload);
          const lifecyclePayloadItems = signalLines
            .map((line) => ({
              line,
              payload: getManualSignalLifecyclePayload(line),
            }))
            .filter((item) => item.payload);
          const effectivePayloadItems = payloadItems.length
            ? payloadItems
            : lifecyclePayloadItems;
          const payloads = effectivePayloadItems.map((item) => item.payload);
          const entryItem = effectivePayloadItems.find((item) =>
            /_ENTRY$/.test(item.payload.signal),
          );
          const exitItem = effectivePayloadItems.find((item) =>
            /_EXIT$/.test(item.payload.signal),
          );
          const entry = entryItem?.payload;
          const exit = exitItem?.payload;
          const openOptionLine = signalLines.find((line) =>
            /Selected Option:/i.test(line),
          );
          const closeOptionLine = signalLines.find((line) =>
            /Position closed:/i.test(line),
          );
          const entrySizingLine = signalLines.find((line) =>
            /Entry sizing:/i.test(line),
          );
          const entrySizing = getEntrySizingDetails(entrySizingLine);
          const executionContextLine = signalLines.find((line) =>
            /Execution context:/i.test(line),
          );
          const executionContext =
            getExecutionContextDetails(executionContextLine) ||
            getManualSignalLifecycleContext(signalLines);
          const openOption = getReadableOption(openOptionLine);
          const closeOption = getReadableOption(
            closeOptionLine || openOptionLine,
          );
          const ignoredLine = signalLines.find((line) =>
            isIgnoredSignalLogLine(line),
          );
          const orderErrorLine = signalLines.find((line) =>
            /DHAN .* ERROR/i.test(line),
          );
          const brokerEntryFailureLine = signalLines.find((line) =>
            /(LONG_ENTRY|SHORT_ENTRY).*(not filled|rejected|failed)/i.test(
              line,
            ),
          );
          const positionChangedLine = signalLines.find((line) =>
            /Position changed to (LONG|SHORT)/i.test(line),
          );
          const manualSignalResponseLostLine = signalLines.find((line) =>
            /MANUAL_SIGNAL response lost after processing/i.test(line),
          );
          const manualSignalFailureLine = signalLines.find((line) =>
            /MANUAL_SIGNAL failed(?:\s|:)/i.test(line),
          );
          const telegramErrorLine = signalLines.find((line) =>
            /Telegram Error/i.test(line),
          );
          const summaryItems = [];
          const fallbackTimestamp = getLogTimestamp(signalLines[0]);
          const pushSummaryLine = (label, value, sourceLine) => {
            const timestamp =
              getLogTimestamp(sourceLine || "") || fallbackTimestamp;
            summaryItems.push({
              sortValue: getTimestampSortValue(timestamp),
              timestamp,
              label,
              value,
              text: formatTimestampedSummary(
                timestamp,
                formatSummaryLine(label, value),
              ),
            });
          };

          if (entry) {
            pushSummaryLine(
              `${sourceLabel} Entry`,
              entry.signal,
              entryItem.line,
            );
            const signalInterval =
              entry.interval || entry.timeframe || executionContext?.interval;

            if (signalInterval) {
              pushSummaryLine(
                "Timeframe",
                `${signalInterval} Minute`,
                entryItem.line,
              );
            }
            if (entry.symbol) {
              pushSummaryLine("Symbol", entry.symbol, entryItem.line);
            }
            if (entry.price) {
              pushSummaryLine("Spot", entry.price, entryItem.line);
            }
            if (executionContext) {
              pushSummaryLine(
                "Execution Mode",
                getExecutionModeLabel(executionContext),
                executionContextLine,
              );
            }

            if (orderErrorLine) {
              pushSummaryLine(
                "Order Failed",
                getFailureReason(orderErrorLine),
                orderErrorLine,
              );
            } else if (brokerEntryFailureLine) {
              pushSummaryLine(
                "Order Failed",
                getFailureReason(brokerEntryFailureLine) ||
                  "Broker did not fill the entry",
                brokerEntryFailureLine,
              );
            } else if (manualSignalResponseLostLine) {
              pushSummaryLine(
                "Signal Warning",
                getFailureReason(manualSignalResponseLostLine),
                manualSignalResponseLostLine,
              );
            } else if (manualSignalFailureLine) {
              pushSummaryLine(
                "Signal Failed",
                getFailureReason(manualSignalFailureLine),
                manualSignalFailureLine,
              );
            } else if (ignoredLine) {
              pushSummaryLine(
                "Signal Ignored",
                getFailureReason(ignoredLine),
                ignoredLine,
              );
            } else if (openOption && positionChangedLine) {
              pushSummaryLine(
                "Position Opened",
                openOption,
                positionChangedLine,
              );
            }

            if (entrySizing) {
              pushSummaryLine(
                "Lots to Buy",
                `${entrySizing.lots} Lots (${entrySizing.quantity} Qty)`,
                entrySizingLine,
              );
              pushSummaryLine(
                "SL Risk Points",
                entrySizing.riskPoints,
                entrySizingLine,
              );

              if (
                entrySizing.source === "LIVE_PREMIUM" &&
                entrySizing.previousCandleLow !== "n/a"
              ) {
                pushSummaryLine(
                  "Prev. Candle Low",
                  entrySizing.previousCandleLow,
                  entrySizingLine,
                );
              }

              if (
                entrySizing.source === "LIVE_PREMIUM" &&
                entrySizing.halfCandle
              ) {
                pushSummaryLine(
                  "Adjusted Premium SL",
                  `${entrySizing.premiumSl} (half of ${entrySizing.previousCandleRange}-point candle)`,
                  entrySizingLine,
                );
              }

              if (
                entrySizing.source === "LIVE_PREMIUM" &&
                entrySizing.optionLtp !== "n/a"
              ) {
                pushSummaryLine(
                  "Option LTP",
                  entrySizing.optionLtp,
                  entrySizingLine,
                );
              }
            }
          }

          if (exit) {
            pushSummaryLine(`${sourceLabel} Exit`, exit.signal, exitItem.line);
            if (executionContext) {
              pushSummaryLine(
                "Execution Mode",
                getExecutionModeLabel(executionContext),
                executionContextLine,
              );
            }

            if (orderErrorLine) {
              pushSummaryLine(
                "Order Failed",
                getFailureReason(orderErrorLine),
                orderErrorLine,
              );
            } else if (manualSignalResponseLostLine) {
              pushSummaryLine(
                "Signal Warning",
                getFailureReason(manualSignalResponseLostLine),
                manualSignalResponseLostLine,
              );
            } else if (manualSignalFailureLine) {
              pushSummaryLine(
                "Signal Failed",
                getFailureReason(manualSignalFailureLine),
                manualSignalFailureLine,
              );
            } else if (ignoredLine) {
              pushSummaryLine(
                "Signal Ignored",
                getFailureReason(ignoredLine),
                ignoredLine,
              );
            } else if (closeOption) {
              pushSummaryLine("Position Closed", closeOption, closeOptionLine);
            }
          }

          if (!entry && !exit && ignoredLine) {
            const payload = payloads[0];
            pushSummaryLine(
              `${sourceLabel} Signal`,
              payload?.signal || "UNKNOWN",
              effectivePayloadItems[0]?.line,
            );
            pushSummaryLine(
              "Signal Ignored",
              getFailureReason(ignoredLine),
              ignoredLine,
            );
          }

          if (!entry && !exit && manualSignalFailureLine) {
            const payload = payloads[0];
            pushSummaryLine(
              `${sourceLabel} Signal`,
              payload?.signal || "UNKNOWN",
              effectivePayloadItems[0]?.line,
            );
            pushSummaryLine(
              "Signal Failed",
              getFailureReason(manualSignalFailureLine),
              manualSignalFailureLine,
            );
          }

          if (!entry && !exit && manualSignalResponseLostLine) {
            const payload = payloads[0];
            pushSummaryLine(
              `${sourceLabel} Signal`,
              payload?.signal || "UNKNOWN",
              effectivePayloadItems[0]?.line,
            );
            pushSummaryLine(
              "Signal Warning",
              getFailureReason(manualSignalResponseLostLine),
              manualSignalResponseLostLine,
            );
          }

          if (telegramErrorLine && summaryItems.length) {
            pushSummaryLine(
              "Alert Warning",
              getFailureReason(telegramErrorLine),
              telegramErrorLine,
            );
          }

          return summaryItems;
        }

        function formatTradeModeForLog(context) {
          if (!context) return "Not recorded (legacy)";
          if (context.tradeMode === "PAPER") return "Paper";
          if (context.tradeMode === "SANDBOX") return "Sandbox";
          return "Live";
        }

        const TRADE_LOG_LABEL_WIDTH = 18;

        function formatTradeLogField(label, value) {
          if (!label) return "";
          if (!label.trim()) return " ";

          return `${label.padEnd(TRADE_LOG_LABEL_WIDTH, " ")} : ${value ?? "-"}`;
        }

        function formatTradeLogPair(
          leftLabel,
          leftValue,
          rightLabel,
          rightValue,
        ) {
          const left = formatTradeLogField(leftLabel, leftValue);
          const right = formatTradeLogField(rightLabel, rightValue);

          return right ? `${left.padEnd(42, " ")} | ${right}` : left;
        }

        function getConciseSignalBlock(lines) {
          const items = getConciseSignalItems(lines);

          if (!items.length) {
            return [];
          }

          const byLabel = new Map(items.map((item) => [item.label, item]));
          const signalItem = items.find((item) =>
            /^(Manual|TradingView) (Entry|Exit|Signal)$/.test(item.label),
          );
          const signalPayloadItem = lines
            .map((line) => ({ line, payload: getWebhookPayload(line) }))
            .find((item) => item.payload) ||
            lines
              .map((line) => ({
                line,
                payload: getManualSignalLifecyclePayload(line),
              }))
              .find((item) => item.payload);
          const source = signalItem?.label.startsWith("Manual")
            ? "Manual"
            : "TradingView";
          const executionContext = getExecutionContextDetails(
            lines.find((line) => /Execution context:/i.test(line)),
          ) || getManualSignalLifecycleContext(lines);
          const signalInterval = getSignalInterval(
            lines,
            signalPayloadItem,
            executionContext,
          );
          const outcomeItem = items.find((item) =>
            [
              "Position Opened",
              "Position Closed",
              "Signal Ignored",
              "Order Failed",
              "Signal Failed",
              "Signal Warning",
            ].includes(item.label),
          );
          const timestamp =
            signalItem?.timestamp ||
            items.find((item) => item.timestamp)?.timestamp ||
            "";
          const header =
            `--------------------------------  ${timestamp || "Unknown time"}  ` +
            "--------------------------------";
          const headerBorder =
            "-------------------------------------------------------------------------------------------";
          const optionLtp = byLabel.get("Option LTP")?.value;
          const previousCandleLow = byLabel.get("Prev. Candle Low")?.value;
          const lotsToBuy = byLabel.get("Lots to Buy")?.value;
          const slRiskPoints = byLabel.get("SL Risk Points")?.value;
          const symbol = byLabel.get("Symbol")?.value;
          const spot = byLabel.get("Spot")?.value;

          return [
            headerBorder,
            header,
            headerBorder,
            formatTradeLogPair(
              "Source",
              source,
              "Trade Mode",
              formatTradeModeForLog(executionContext),
            ),
            formatTradeLogPair(
              "Signal",
              `${signalItem?.value || "UNKNOWN"} (${
                signalInterval
                  ? `${signalInterval} min`
                  : "interval not recorded"
              })`,
              outcomeItem?.label,
              outcomeItem?.value,
            ),
            ...(symbol || spot
              ? [
                  formatTradeLogPair(
                    symbol ? "Symbol" : "",
                    symbol,
                    spot ? "Spot" : "",
                    spot,
                  ),
                ]
              : []),
            ...(optionLtp || previousCandleLow
              ? [
                  formatTradeLogPair(
                    optionLtp ? "Option LTP" : "",
                    optionLtp,
                    previousCandleLow ? "Prev. Candle Low" : "",
                    previousCandleLow,
                  ),
                ]
              : []),
            ...(lotsToBuy || slRiskPoints
              ? [
                  formatTradeLogPair(
                    lotsToBuy ? "Lots to Buy" : "",
                    lotsToBuy,
                    slRiskPoints ? "SL Risk Points" : "",
                    slRiskPoints,
                  ),
                ]
              : []),
          ];
        }

        function getConciseSignalBlocks(lines) {
          const webhookIndexes = lines.reduce((indexes, line, index) => {
            if (/Webhook received:/i.test(line)) {
              indexes.push(index);
            }
            return indexes;
          }, []);

          if (!webhookIndexes.length) {
            return getConciseSignalBlock(lines);
          }

          // A normal log section contains one signal. Keep its complete section
          // together because processing can cross into the next second.
          if (webhookIndexes.length === 1) {
            return getConciseSignalBlock(lines);
          }

          const signalTimestamps = webhookIndexes
            .map((index) => getLogTimestamp(lines[index]))
            .filter(Boolean);

          return signalTimestamps.flatMap((timestamp) =>
            getConciseSignalBlock(
              lines.filter((line) => getLogTimestamp(line) === timestamp),
            ),
          );
        }

        function getDisplayLogLines(lines, data) {
          if (data.SHOW_DETAILED_SIGNAL_LOGS) {
            return lines;
          }

          const signalBlock = getConciseSignalBlocks(
            lines.filter((line) => !isReadinessLogLine(line)),
          );

          if (signalBlock.length) {
            return signalBlock;
          }

          return [...getConciseReadinessItems(lines.filter(isReadinessLogLine))]
            .sort((a, b) => b.sortValue - a.sortValue)
            .map((item) => item.text);
        }

        function applyLogFilters() {
          const data = model.getData();
          const rawLogs = data.RAW_LOGS || "";

          if (!rawLogs || rawLogs === "No logs yet.") {
            model.setProperty("/LIVE_LOGS", rawLogs);
            return;
          }

          const outputLines = [];
          let pendingSectionSeparators = [];
          let sectionLines = [];
          let dayHasVisibleSection = false;
          let inManualSignalBlock = false;

          function flushLogSection() {
            if (!sectionLines.length) {
              pendingSectionSeparators = [];
              return;
            }

            if (
              !data.SHOW_PAPER_TRADE_LOGS &&
              sectionLines.some((line) =>
                /Execution context:.*tradeMode=PAPER/i.test(line),
              )
            ) {
              pendingSectionSeparators = [];
              sectionLines = [];
              return;
            }

            if (
              !data.SHOW_IGNORED_SIGNAL_LOGS &&
              sectionLines.some(isIgnoredSignalLogLine)
            ) {
              pendingSectionSeparators = [];
              sectionLines = [];
              return;
            }

            if (
              !data.SHOW_FAILED_SIGNAL_LOGS &&
              sectionLines.some(isFailedSignalLogLine)
            ) {
              pendingSectionSeparators = [];
              sectionLines = [];
              return;
            }

            const displayLines = getDisplayLogLines(sectionLines, data);

            if (!displayLines.length) {
              pendingSectionSeparators = [];
              sectionLines = [];
              return;
            }

            outputLines.push(
              ...(data.SHOW_DETAILED_SIGNAL_LOGS
                ? pendingSectionSeparators
                : []),
              ...displayLines,
            );
            dayHasVisibleSection = true;
            pendingSectionSeparators = [];
            sectionLines = [];
          }

          rawLogs.split("\n").forEach((line) => {
            if (/^=+/.test(line)) {
              flushLogSection();
              if (dayHasVisibleSection && data.SHOW_DETAILED_SIGNAL_LOGS) {
                outputLines.push(line);
              }
              dayHasVisibleSection = false;
              return;
            }

            if (/^---------------------------/.test(line)) {
              if (/Trade\s+-?\d+/.test(line)) {
                pendingSectionSeparators.push(line);
              } else {
                flushLogSection();
                pendingSectionSeparators = [line];
              }

              return;
            }

            const manualLine = isManualSignalLogLine(line);
            const readinessLine = isReadinessLogLine(line);
            let visible = false;

            if (/MANUAL_SIGNAL (completed|failed)/i.test(line)) {
              inManualSignalBlock = true;
            }

            if (readinessLine) {
              visible = data.SHOW_READINESS_LOGS;
            } else if (manualLine || inManualSignalBlock) {
              visible = data.SHOW_MANUAL_SIGNAL_LOGS;
            } else if (isSignalLogLine(line)) {
              visible = data.SHOW_TRADINGVIEW_SIGNAL_LOGS;
            }

            if (visible) {
              sectionLines.push(line);
            }

            if (/MANUAL_SIGNAL requested/i.test(line)) {
              inManualSignalBlock = false;
            }
          });

          flushLogSection();

          model.setProperty(
            "/LIVE_LOGS",
            outputLines.length
              ? outputLines.join("\n")
              : "No logs match the selected filters.",
          );
        }

            const activeValue =
              data[activeSymbolKey] ||

          fetch("/api/config", {
            method: "POST",

            keepalive: true,

        // Send a manual LONG/SHORT entry/exit signal to the local webhook.
        function showManualSignalFailurePopup(result, payload) {
          const response = result.response || {};

          if (response.code !== "PREMIUM_STOP_LOSS_SETUP_FAILED") {
            sap.m.MessageToast.show(result.message || "Manual signal failed");
            return;
          }

          const lines = [
            result.message,
            "",
            `Attempted: ${payload.signal}`,
            `Symbol: ${payload.symbol}`,
            `Spot: ${payload.price}`,
            response.contract ? `Contract: ${response.contract}` : "",
            response.optionLtp != null ? `Option LTP: ${response.optionLtp}` : "",
            response.premiumSl != null ? `Premium SL: ${response.premiumSl}` : "",
            response.previousCandleLow != null
              ? `Previous Candle Low: ${response.previousCandleLow}`
              : "",
            response.previousCandleHigh != null
              ? `Previous Candle High: ${response.previousCandleHigh}`
              : "",
            "",
            "Please confirm LONG or SHORT entry.",
          ].filter((line) => line !== "");

          sap.ui.require(["sap/m/MessageBox"], function (MessageBox) {
            MessageBox.warning(lines.join("\n"), {
              title: "Manual Entry Blocked",
            });
          });
        }

        function confirmManualEntrySignal(payload) {
          if (!["LONG_ENTRY", "SHORT_ENTRY"].includes(payload.signal)) {
            return Promise.resolve(true);
          }

          const side = payload.signal === "LONG_ENTRY" ? "LONG" : "SHORT";
          const displayName =
            UNDERLYING_DEFAULTS[payload.symbol]?.displayName || payload.symbol;
          const interval = `${payload.interval} min`;
          const mode =
            model.getProperty("/PAPER_TRADE") === "true"
              ? "Paper Trade"
              : `${model.getProperty("/DHAN_ENV") || "LIVE"} Live`;

          return new Promise((resolve) => {
            sap.ui.require(["sap/m/MessageBox"], function (MessageBox) {
              MessageBox.confirm(
                [
                  `Send ${side} entry signal?`,
                  "",
                  `Underlying: ${displayName}`,
                  `Spot: ${payload.price}`,
                  `Interval: ${interval}`,
                  `Mode: ${mode}`,
                ].join("\n"),
                {
                  title: "Confirm Manual Entry",
                  actions: [MessageBox.Action.CANCEL, MessageBox.Action.OK],
                  emphasizedAction: MessageBox.Action.OK,
                  onClose: (action) =>
                    resolve(action === MessageBox.Action.OK),
                },
              );
            });
          });
        }

        async function sendTestSignal(signal) {
          const data = model.getData();
          model.setProperty("/SHOW_MANUAL_SIGNAL_LOGS", true);
          model.setProperty("/SHOW_PAPER_TRADE_LOGS", true);
          saveDailyLogFilterPrefs();

          const activeUnderlying = normalizeUnderlyingSymbol(
            data.UNDERLYING_SYMBOL ||
              data.algoLiveStatus?.underlyingSymbol ||

          );
          const manualPrice =
            toNumber(data.TEST_PRICE) || toNumber(data.NIFTY_SPOT_LTP);

          if (!manualPrice) {
            const displayName =
              UNDERLYING_DEFAULTS[activeUnderlying]?.displayName ||
              activeUnderlying;
            const message = `${displayName} spot price is required before sending a manual signal. Refresh spot or type the spot price.`;

            model.setProperty("/NIFTY_SPOT_ERROR", message);
            sap.m.MessageToast.show(message);
            return;
          }

          const payload = {
