        function toNumber(value) {
          const text = String(value ?? "")
            .replace(/,/g, "")
            .trim();

          if (!text) return null;

          const number = Number(text);

          return Number.isFinite(number) ? number : null;
        }

        function roundToOptionTick(value) {
          const number = Number(value);

          if (!Number.isFinite(number)) return null;

          return Number((Math.round(number / 0.05) * 0.05).toFixed(2));
        }

        function formatPremiumValue(value) {
          if (value === undefined || value === null || value === "") return "-";

          const number = Number(value);

          if (!Number.isFinite(number)) return "-";

          return number.toFixed(2);
        }

        function getActiveTrailContext() {
          const trade = model.getProperty("/algoLiveStatus/lastTrades/0") || {};
          const position =
            model.getProperty("/algoLiveStatus/activePosition") || {};
          const quantity = toNumber(trade.quantity || position.quantity);
          const entryPremium = toNumber(trade.entryPrice);
          const currentPremium = toNumber(
            trade.currentPremium || position.currentPremium,
          );
          const currentStopLoss = toNumber(
            position.premiumStopLoss || trade.premiumStopLoss,
          );
          const riskPoints = toNumber(trade.riskPoints);
          const limitBand =
            toNumber(model.getProperty("/PREMIUM_SL_LIMIT_BAND")) || 1;

          return {
            trade,
            position,
            quantity,
            entryPremium,
            currentPremium,
            currentStopLoss,
            riskPoints,
            limitBand,
          };
        }

        function buildTrailPrices(triggerPrice, limitBand) {
          const trigger = roundToOptionTick(triggerPrice);
          const limit = trigger ? roundToOptionTick(trigger - limitBand) : null;

          if (!trigger || !limit || limit <= 0 || limit >= trigger) {
            return null;
          }

          return {
            triggerPrice: trigger,
            limitPrice: limit,
          };
        }

        function updateManualTrailLimitFromTrigger(value) {
          const trigger = toNumber(value);

          if (!trigger) {
            model.setProperty("/TRAIL_LIMIT_PRICE", "");
            return;
          }

          const limit = roundToOptionTick(trigger - 0.5);

          model.setProperty(
            "/TRAIL_LIMIT_PRICE",
            limit && limit > 0 ? String(limit) : "",
          );
        }

        function getClassicTrailSteps() {
          const fields = [
            ["TRAIL_CLASSIC_TRIGGER_RR_1", "TRAIL_CLASSIC_LOCK_RR_1"],
            ["TRAIL_CLASSIC_TRIGGER_RR_2", "TRAIL_CLASSIC_LOCK_RR_2"],
            ["TRAIL_CLASSIC_TRIGGER_RR_3", "TRAIL_CLASSIC_LOCK_RR_3"],
          ];

          return fields
            .map(([triggerPath, lockPath]) => ({
              triggerRr: toNumber(model.getProperty(`/${triggerPath}`)),
              lockRr: toNumber(model.getProperty(`/${lockPath}`)),
            }))
            .filter(
              (step) =>
                step.triggerRr !== null &&
                step.triggerRr > 0 &&
                step.lockRr !== null &&
                step.lockRr >= 0,
            );
        }

        function getTrailPlan(mode = model.getProperty("/TRAIL_MODE")) {
          const context = getActiveTrailContext();

          if (!context.position?.stopLossOrderId) {
            return {
              eligible: false,
              message: "No active SL order",
            };
          }

          if (
            !context.quantity ||
            !context.entryPremium ||
            !context.currentPremium ||
            !context.currentStopLoss
          ) {
            return {
              eligible: false,
              message: "Waiting for active premium metrics",
            };
          }

          if (mode === "MANUAL") {
            return {
              eligible: true,
              message: "Manual trigger and limit",
            };
          }

          if (mode === "CONSERVATIVE" || mode === "AGGRESSIVE") {
            const threshold = toNumber(
              model.getProperty("/TRAIL_COST_TO_COST_PERCENT"),
            );
            const targetPremium =
              threshold !== null
                ? roundToOptionTick(
                    context.entryPremium * (1 + threshold / 100),
                  )
                : null;
            const targetProfitAmount =
              targetPremium !== null
                ? (targetPremium - context.entryPremium) * context.quantity
                : null;
            const prices = buildTrailPrices(
              context.entryPremium,
              context.limitBand,
            );
            const thresholdMet =
              threshold !== null &&
              threshold >= 0 &&
              context.currentPremium >= targetPremium;
            const improvesStop =
              prices && prices.triggerPrice > context.currentStopLoss;

            return {
              eligible: Boolean(thresholdMet && improvesStop && prices),
              triggerPrice: prices?.triggerPrice,
              limitPrice: prices?.limitPrice,
              targetPremium,
              targetProfitAmount,
              targetLabel: `${threshold}% profit`,
              message: thresholdMet
                ? improvesStop
                  ? `Move SL to cost at ${formatPremiumValue(prices?.triggerPrice)}`
                  : "Cost SL is not above current SL"
                : `Needs option premium ${formatPremiumValue(targetPremium)}`,
            };
          }

          if (mode === "CLASSIC") {
            if (!context.riskPoints || context.riskPoints <= 0) {
              return {
                eligible: false,
                message: "Risk points unavailable",
              };
            }

            const steps = getClassicTrailSteps();
            const currentRr =
              (context.currentPremium - context.entryPremium) /
              context.riskPoints;
            const selectedStep =
              steps
                .filter((step) => currentRr >= step.triggerRr)
                .sort((a, b) => b.lockRr - a.lockRr)[0] || steps[0];

            if (!selectedStep) {
              return {
                eligible: false,
                message: "Classic RR steps unavailable",
              };
            }

            const targetPremium = roundToOptionTick(
              context.entryPremium +
                context.riskPoints * selectedStep.triggerRr,
            );
            const targetProfitAmount =
              context.riskPoints * selectedStep.triggerRr * context.quantity;
            const lockPremium = roundToOptionTick(
              context.entryPremium + context.riskPoints * selectedStep.lockRr,
            );
            const lockProfitAmount =
              context.riskPoints * selectedStep.lockRr * context.quantity;
            const prices = buildTrailPrices(lockPremium, context.limitBand);
            const thresholdMet = currentRr >= selectedStep.triggerRr;
            const improvesStop =
              prices && prices.triggerPrice > context.currentStopLoss;

            return {
              eligible: Boolean(thresholdMet && improvesStop && prices),
              triggerPrice: prices?.triggerPrice,
              limitPrice: prices?.limitPrice,
              targetPremium,
              targetProfitAmount,
              lockPremium,
              lockProfitAmount,
              triggerRr: selectedStep.triggerRr,
              lockRr: selectedStep.lockRr,
              targetLabel: `1:${selectedStep.triggerRr}`,
              message: thresholdMet
                ? improvesStop
                  ? `Lock 1:${selectedStep.lockRr} at ${formatPremiumValue(lockPremium)}`
                  : "Selected lock is not above current SL"
                : `Needs RR 1:${selectedStep.triggerRr}`,
            };
          }

          return {
            eligible: false,
            message: "Select trail mode",
          };
        }

        function formatTrailPlan(mode) {
          const plan = getTrailPlan(mode);

          if (mode === "MANUAL") {
            return "Live now: enter Dhan SL trigger and limit prices manually.";
          }

          if (mode === "CONSERVATIVE") {
            return [
              `Cost-to-cost after ${model.getProperty("/TRAIL_COST_TO_COST_PERCENT") || 7}%`,
              `target ${formatPremiumValue(plan.targetPremium)}`,
              plan.targetProfitAmount !== undefined
                ? `profit ${formatRupeeValue(plan.targetProfitAmount)}`
                : "",
              plan.message,
            ]
              .filter(Boolean)
              .join(" • ");
          }

          if (mode === "AGGRESSIVE") {
            return [
              `Cost-to-cost after ${model.getProperty("/TRAIL_COST_TO_COST_PERCENT") || 7}%`,
              `then candle trailing`,
              `target ${formatPremiumValue(plan.targetPremium)}`,
              plan.targetProfitAmount !== undefined
                ? `profit ${formatRupeeValue(plan.targetProfitAmount)}`
                : "",
              plan.message,
            ]
              .filter(Boolean)
              .join(" • ");
          }

          if (mode === "CLASSIC") {
            return [
              `Trigger ${plan.targetLabel || "-"}`,
              `target ${formatPremiumValue(plan.targetPremium)}`,
              plan.targetProfitAmount !== undefined
                ? `profit ${formatRupeeValue(plan.targetProfitAmount)}`
                : "",
              plan.lockPremium !== undefined
                ? `SL ${formatPremiumValue(plan.lockPremium)}`
                : "",
              plan.lockProfitAmount !== undefined
                ? `locks ${formatRupeeValue(plan.lockProfitAmount)}`
                : "",
              plan.message,
            ]
              .filter(Boolean)
              .join(" • ");
          }

          return plan.message || "";
        }

        function createTrailPlanSummary() {

                    { path: "/TRAIL_CLASSIC_LOCK_RR_1" },

        async function trailStopLoss(modeOverride) {
          const data = model.getData();
          const trailMode = modeOverride || data.TRAIL_MODE || "CONSERVATIVE";
          const plan = getTrailPlan(trailMode);
          const triggerPrice =
            trailMode === "MANUAL"
              ? toNumber(data.TRAIL_TRIGGER_PRICE)
              : plan.triggerPrice;
          const limitPrice =
            trailMode === "MANUAL"
              ? toNumber(data.TRAIL_LIMIT_PRICE)
              : plan.limitPrice;

          if (!triggerPrice || !limitPrice) {
            sap.m.MessageToast.show(
              plan.message || "Enter trigger and limit prices",
            );
            return;
          }

          if (trailMode !== "MANUAL" && !plan.eligible) {
            sap.m.MessageToast.show(plan.message || "Trail condition not met");
            return;
          }

          const result = await fetch("/api/trail-stop-loss", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              triggerPrice,
              limitPrice,
            }),
          }).then((r) => r.json());

          sap.m.MessageToast.show(
            result.message || "Stop-loss trail request sent",
          );

          if (result.success) {
            model.setProperty("/TRAIL_TRIGGER_PRICE", "");
            model.setProperty("/TRAIL_LIMIT_PRICE", "");
          }

          await refreshAlgoStatus();
          await refreshLogs();
        }

        }

        // Compact numeric input used in the daily trading plan card.
        function formatIndianNumber(value) {
          const number = Number(String(value ?? "").replace(/,/g, ""));

          if (!Number.isFinite(number)) {
            return value || "";
          }

          return number.toLocaleString("en-IN", {
            maximumFractionDigits: 2,
          });
        }

        function formatIndianWholeNumber(value) {
          const number = Number(String(value ?? "").replace(/,/g, ""));

          if (!Number.isFinite(number)) {
            return value || "";
          }

          return Math.round(number).toLocaleString("en-IN", {
            maximumFractionDigits: 0,
          });
        }

        const PREMIUM_HUGE_CANDLE_FIELDS = [
          { label: "1 Minute", activeKey: "PREMIUM_HUGE_CANDLE_1M", suffix: "1M" },
          { label: "3 Minutes", activeKey: "PREMIUM_HUGE_CANDLE_3M", suffix: "3M" },
          { label: "5 Minutes", activeKey: "PREMIUM_HUGE_CANDLE_5M", suffix: "5M" },
          { label: "15 Minutes", activeKey: "PREMIUM_HUGE_CANDLE_15M", suffix: "15M" },
          { label: "30 Minutes", activeKey: "PREMIUM_HUGE_CANDLE_30M", suffix: "30M" },
        ];

        const PREMIUM_HUGE_CANDLE_DEFAULTS = {
          NIFTY: {
            PREMIUM_HUGE_CANDLE_1M: "6",
            PREMIUM_HUGE_CANDLE_3M: "12",
            PREMIUM_HUGE_CANDLE_5M: "15",
            PREMIUM_HUGE_CANDLE_15M: "25",
            PREMIUM_HUGE_CANDLE_30M: "40",
          },
          BANKNIFTY: {
            PREMIUM_HUGE_CANDLE_1M: "10",
            PREMIUM_HUGE_CANDLE_3M: "15",
            PREMIUM_HUGE_CANDLE_5M: "20",
            PREMIUM_HUGE_CANDLE_15M: "40",
            PREMIUM_HUGE_CANDLE_30M: "70",
          },
        };

        function normalizeUnderlyingSymbol(symbol) {
          return String(symbol || "").toUpperCase() === "BANKNIFTY"
            ? "BANKNIFTY"
            : "NIFTY";
        }

        function premiumHugeCandleSymbolKey(symbol, suffix) {
          return normalizeUnderlyingSymbol(symbol) + "_PREMIUM_HUGE_CANDLE_" + suffix;
        }

        function syncActivePremiumHugeCandleField(activeKey, value) {
          const field = PREMIUM_HUGE_CANDLE_FIELDS.find(
            (candidate) => candidate.activeKey === activeKey,
          );

          if (!field) return;

          model.setProperty(
            "/" +
              premiumHugeCandleSymbolKey(
                activePremiumHugeCandleUnderlying,
                field.suffix,
              ),
            value,
          );
        }

        function getPremiumHugeCandleModelValue(symbol, field) {
          const normalized = normalizeUnderlyingSymbol(symbol);
          const symbolValue = model.getProperty(
            "/" + premiumHugeCandleSymbolKey(normalized, field.suffix),
          );

          if (symbolValue !== undefined && symbolValue !== null && symbolValue !== "") {
            return symbolValue;
          }

          return PREMIUM_HUGE_CANDLE_DEFAULTS[normalized][field.activeKey];
        }

        function stashPremiumHugeCandleValues(symbol) {
          const normalized = normalizeUnderlyingSymbol(symbol);

          PREMIUM_HUGE_CANDLE_FIELDS.forEach((field) => {
            const activeValue = model.getProperty("/" + field.activeKey);

            if (activeValue !== undefined && activeValue !== null && activeValue !== "") {
              model.setProperty(
                "/" + premiumHugeCandleSymbolKey(normalized, field.suffix),
                activeValue,
              );
            }
          });
        }

        function applyPremiumHugeCandleValues(symbol) {
          const normalized = normalizeUnderlyingSymbol(symbol);

          PREMIUM_HUGE_CANDLE_FIELDS.forEach((field) => {
            model.setProperty(
              "/" + field.activeKey,
              getPremiumHugeCandleModelValue(normalized, field),
            );
          });
        }

        const UNDERLYING_DEFAULTS = {
          NIFTY: {
            displayName: "NIFTY",
            lotSize: "65",
            strikeStep: "50",
            planningSlPoints: "25",
            spotSegment: "IDX_I",
            spotSecurityId: "13",
          },
          BANKNIFTY: {
            displayName: "BANKNIFTY",
            lotSize: "30",
            strikeStep: "100",
            planningSlPoints: "40",
            spotSegment: "IDX_I",
            spotSecurityId: "25",
          },
        };

        function applyUnderlyingDefaults(
          symbol,
          previousSymbol = activePremiumHugeCandleUnderlying,
        ) {
          const normalized = normalizeUnderlyingSymbol(symbol);
          const previous = normalizeUnderlyingSymbol(previousSymbol || normalized);
          const defaults = UNDERLYING_DEFAULTS[normalized];

          stashPremiumHugeCandleValues(previous);
          model.setProperty("/UNDERLYING_SYMBOL", normalized);
          model.setProperty("/UNDERLYING_DISPLAY_NAME", defaults.displayName);
          model.setProperty("/LOT_SIZE", defaults.lotSize);
          model.setProperty("/STRIKE_STEP", defaults.strikeStep);
          model.setProperty("/PLANNING_SL_POINTS", defaults.planningSlPoints);
          model.setProperty("/UNDERLYING_SPOT_SEGMENT", defaults.spotSegment);
          model.setProperty(
            "/UNDERLYING_SPOT_SECURITY_ID",
            defaults.spotSecurityId,
          );
          applyPremiumHugeCandleValues(normalized);
          activePremiumHugeCandleUnderlying = normalized;
        }

        function createPlanningMetricTile(label, path, className, customData) {
          const tile = new sap.m.VBox({
            width: "100%",
            items: [
              new sap.m.Text({ text: label }).addStyleClass("statusTitle"),
              new sap.m.Text({
                text: {
                  path: "/" + path,
                  formatter: function (value) {
                    if (value === undefined || value === null || value === "") {
                      return "-";
                    }

                    const number = Number(value);

                    if (!Number.isFinite(number)) {
                      return value;
                    }

                    return number.toLocaleString("en-IN", {
                      maximumFractionDigits: 2,
                    });

        // Frontend copy of the lot sizing math for quick planning.
        function isSelectedUnderlyingExpiryToday(data = model.getData()) {
          const underlying = normalizeUnderlyingSymbol(data.UNDERLYING_SYMBOL);
          const meta =
            underlying === "BANKNIFTY"
              ? data.BANKNIFTY_NEXT_EXPIRY_META
              : data.NIFTY_NEXT_EXPIRY_META;

          return meta === "Expiry today";
        }

        function getPlanningLotsForRisk({
          capital,
          riskPercent,
          sl,
          lotSize,
          maxTrades,
          riskMode,
          marketBias,
        }) {
          const riskAmount = (capital * riskPercent) / 100;
          const lossPerLot = sl * lotSize;
          let lots = 0;

          if (lossPerLot > 0) {
            lots = Math.floor(riskAmount / lossPerLot);

            if (riskMode === "PER_DAY") {
              lots = Math.floor(lots / maxTrades);
            }
          }

          let longLots = lots;
          let shortLots = lots;

          if (marketBias === "BULLISH") {
            shortLots = lots > 1 ? Math.max(1, Math.floor(lots / 2)) : lots;
          }

          if (marketBias === "BEARISH") {
            longLots = lots > 1 ? Math.max(1, Math.floor(lots / 2)) : lots;
          }

          return {
            riskAmount,
            lossPerLot,
            actualRisk: lossPerLot * maxTrades,
            longLots,
            shortLots,
          };
        }

        function calculateRisk() {
          const data = model.getData();

          const capital = Number(data.TRADING_CAPITAL || 0);
          const riskPercent = Number(data.RISK_PERCENT || 1);
          const expiryRiskReductionActive = isSelectedUnderlyingExpiryToday(data);
          const effectiveRiskPercent = expiryRiskReductionActive
            ? riskPercent / 2
            : riskPercent;
          const sl = Number(data.PLANNING_SL_POINTS || 0);
          const lotSize = Number(data.LOT_SIZE || 65);
          const maxTrades = Number(data.MAX_DAILY_TRADES || 1);
          const revisedPlan = getPlanningLotsForRisk({
            capital,
            riskPercent: effectiveRiskPercent,
            sl,
            lotSize,
            maxTrades,
            riskMode: data.RISK_MODE,
            marketBias: data.MARKET_BIAS,
          });

          model.setProperty(
            "/EXPIRY_RISK_REDUCTION_ACTIVE",
            expiryRiskReductionActive,
          );
          model.setProperty(
            "/CALC_EFFECTIVE_RISK_PERCENT",
            effectiveRiskPercent,
          );
          model.setProperty(
            "/EXPIRY_RISK_REDUCTION_TEXT",
            expiryRiskReductionActive
              ? "Expiry day mode: half-size trades."
              : "",
          );
          model.setProperty("/CALC_RISK_AMOUNT", revisedPlan.riskAmount);
          model.setProperty("/CALC_LOSS_PER_LOT", revisedPlan.lossPerLot);
          model.setProperty("/CALC_ACTUAL_RISK", revisedPlan.actualRisk);
          model.setProperty("/CALC_LONG_LOTS", revisedPlan.longLots);
          model.setProperty("/CALC_SHORT_LOTS", revisedPlan.shortLots);
        }

        function formatActiveOptionSymbol(optionSymbol) {
          const text = String(optionSymbol || "").trim();
          const match = text.match(/^(NIFTY|BANKNIFTY)\b.*\b(CALL|PUT)$/i);

          return match
            ? `${match[1].toUpperCase()} ${match[2].toUpperCase()}`
            : text;
        }

        function formatRupeeValue(value) {
          if (value === undefined || value === null || value === "") return "";

          const number = Number(value);

          if (!Number.isFinite(number)) return "";

          return `₹${number.toLocaleString("en-IN", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2,
          })}`;
        }

        function formatSignedPercent(value) {
          const number = Number(value);

          if (!Number.isFinite(number)) return "";

          return `${number >= 0 ? "+" : ""}${number.toFixed(2)}%`;
        }

        function getTradeProfitNumber(trade) {
          const profit = Number(trade?.realizedProfit);

          return Number.isFinite(profit) ? profit : null;
        }

        function getTradeOutcomeLabel(trade) {
          if (!trade) return "";

          const profit = getTradeProfitNumber(trade);
          const riskAmount = Number(trade.riskAmount);
          const rewardMultiple =
            Number.isFinite(profit) &&
            profit > 0 &&
            Number.isFinite(riskAmount) &&
            riskAmount > 0
              ? profit / riskAmount
              : null;

          if (profit === 0) {
            return "Cost to cost";
          }

          if (trade.status === "SL_HIT") {
            if (profit !== null && profit > 0) {
              return "Profit locked";
            }

            return "SL hit";
          }

          if (rewardMultiple !== null && rewardMultiple >= 1) {
            return `1:${Math.floor(rewardMultiple)} target hit`;
          }

          if (profit !== null && profit > 0) {
            return "Profit booked";
          }

          return trade.displayStatus || trade.status || "Recorded";
        }

        function formatSignedRupeeValue(value) {
          const number = Number(value);

          if (!Number.isFinite(number)) return "";

          if (number === 0) return "₹0.00";

          return `${number > 0 ? "+" : "-"}${formatRupeeValue(
            Math.abs(number),
          )}`;
        }

        function formatLastTradeSummary(trade) {
          if (!trade) return "";

          return getTradeOutcomeLabel(trade);
        }

        function formatLastTradeProfit(trade) {
          const profit = getTradeProfitNumber(trade);

          return profit !== null ? formatSignedRupeeValue(profit) : "";
        }

        function getLastTradeProfitClass(trade) {
          const profit = getTradeProfitNumber(trade);

          if (profit > 0) return "lastTradeProfitPositive";
          if (profit < 0) return "lastTradeProfitNegative";

        function formatAnalyticsLossMoney(value) {

        function formatAnalyticsDateLabel(dateKey) {
          const [year, month, day] = String(dateKey || "")
            .split("-")
            .map((part) => Number(part));
          const date = new Date(year, month - 1, day);

          if (
            !Number.isFinite(year) ||
            !Number.isFinite(month) ||
            !Number.isFinite(day) ||
            Number.isNaN(date.getTime())
          ) {
            return dateKey || "-";
          }

          const suffix =
            day % 100 >= 11 && day % 100 <= 13
              ? "th"
              : { 1: "st", 2: "nd", 3: "rd" }[day % 10] || "th";
          const monthLabel = date.toLocaleString("en-IN", { month: "long" });

          return `${day}${suffix} ${monthLabel}`;
        }

                              message: `Checking ${selected} connection...`,

                              new sap.m.Input({
                                value: "{/TRAIL_TRIGGER_PRICE}",
                                type: "Number",
                                placeholder: "Trigger price",
                                liveChange: function (event) {
                                  const value = event.getParameter("value");

                                  model.setProperty(
                                    "/TRAIL_TRIGGER_PRICE",
                                    value,
                                  );
                                  updateManualTrailLimitFromTrigger(value);
                                },
                                change: function (event) {
                                  updateManualTrailLimitFromTrigger(
                                    event.getParameter("value"),
                                  );
                                },
                              }).addStyleClass(
                                "trailSlInput trailTriggerInput",
                              ),

                              new sap.m.HBox({
                                alignItems: "Center",
                                justifyContent: "Center",
                                items: [
                                  new sap.m.Text({
                                    text: ">",
                                  }).addStyleClass("trailPriceOperatorText"),
                                ],
                              }).addStyleClass("trailPriceOperator"),

                              new sap.m.Input({
                                value: "{/TRAIL_LIMIT_PRICE}",
                                type: "Number",
                                placeholder: "Limit price",
                              }).addStyleClass("trailSlInput trailLimitInput"),

                              new sap.m.Button({
                                text: "Trail",
                                icon: "sap-icon://trend-up",
                                type: "Emphasized",
                                press: () => trailStopLoss("MANUAL"),
                                enabled: {
                                  path: "/algoLiveStatus/activePosition/stopLossOrderId",
                                  formatter: (orderId) => Boolean(orderId),
                                },
                              }).addStyleClass(
                                "trailSlButton trailManualButton",
                              ),
                            ],
                          }).addStyleClass("trailSlControls"),

                          new sap.m.Text({
                            text: "Trail SL Manually",
                          }).addStyleClass("trailModeFooter"),
                        ],
                      }).addStyleClass("manualActionGroup trailSlGroup"),
                    ],
                  }).addStyleClass("manualSignalControlGrid"),

                  new sap.m.MessageStrip({
                    text: "These buttons send webhook signals into the bot. Paper Trade ON simulates orders; Paper Trade OFF sends orders to the selected Dhan environment.",
                    type: "Warning",
                    showIcon: true,
                  }).addStyleClass("manualSignalWarning"),
                ],
              }).addStyleClass("manualSignalComposer"),
            ],
          }).addStyleClass("card manualSignalsCard");
        }

        function tradingViewPayloadCard(item) {
          const payloadTextArea = new sap.m.TextArea({
            editable: false,
            growing: true,
            width: "100%",
            rows: 7,
          }).addStyleClass("payloadTextArea");

          payloadTextArea.setValue(item.payload);

          return new sap.m.VBox({
            items: [
              new sap.m.HBox({
                alignItems: "Center",
                justifyContent: "SpaceBetween",
                items: [
                  new sap.m.Text({
                    text: item.title,
                  }).addStyleClass("payloadTitle"),
                  new sap.m.Button({
                    icon: "sap-icon://copy",
                    tooltip: `Copy ${item.title} payload`,
                    type: "Transparent",
                    press: () =>
                      copyTextToClipboard(
                        item.payload,
                        `${item.title} payload copied`,
                        "Payload unavailable",
                      ),
                  }),
                ],
              }).addStyleClass("payloadHeader"),
              payloadTextArea,
            ],
          }).addStyleClass("payloadCard");
        }

        function tradingViewReferenceCard() {
          return new sap.m.VBox({
            items: [
              new sap.m.Title({
                text: "📡 Webhook Console",
                level: "H3",
              }).addStyleClass("sectionTitle"),

              new sap.m.HBox({
                items: [
                  new sap.m.HBox({
                    alignItems: "Center",
                    items: [
                      createLabelWithInfo(
                        "Webhook URL",
                        "If this is empty, start ngrok from System Readiness and wait a few seconds for the public webhook URL.",
                        "webhookLabel",
                      ),
                      new sap.m.Input({
                        value: "{/ngrokUrl}",
                        editable: false,
                        width: "100%",
                      }).addStyleClass("webhookInput"),
                      new sap.m.Button({
                        icon: "sap-icon://copy",
                        tooltip: "Copy Webhook URL",
                        type: "Transparent",
                        press: () =>
                          copyTextToClipboard(
                            model.getProperty("/ngrokUrl"),
                            "Webhook URL copied",
                            "No webhook URL available",
                          ),
                      }),
                    ],
                  }).addStyleClass("webhookUrlRow tradingViewReferenceRow"),

                  new sap.m.HBox({
                    alignItems: "Center",
                    items: [
                      new sap.m.Label({
                        text: "Public IP",
                      }).addStyleClass("webhookLabel networkIpLabel"),
                      new sap.m.ObjectStatus({
                        text: {
                          parts: [
                            { path: "/NETWORK_PUBLIC_IP" },
                            { path: "/NETWORK_IP_ERROR" },
                          ],
                          formatter: (ip, error) => ip || error || "Checking...",
                        },
                        state: {
                          path: "/NETWORK_IP_ERROR",
                          formatter: (v) => (v ? "Warning" : "None"),
                        },
                      }).addStyleClass("networkIpStatus"),
                      new sap.m.Button({
                        icon: "sap-icon://copy",
                        tooltip: "Copy Public IP",
                        type: "Transparent",
                        press: () =>
                          copyTextToClipboard(
                            model.getProperty("/NETWORK_PUBLIC_IP"),
                            "Public IP copied",
                            "No public IP available",
                          ),
                      }),
                    ],
                  }).addStyleClass("networkIpRow tradingViewReferenceRow"),

                  new sap.m.HBox({
                    alignItems: "Center",
                    items: [
                      createLabelWithInfo(
                        "Indicator Code",
                        "Download the TradingView Pine Script indicator stored in this project.",
                        "webhookLabel",
                      ),
                      new sap.m.Button({
                        text: "Download",
                        icon: "sap-icon://download",
                        type: "Emphasized",
                        tooltip: "Download TradingView indicator code",
                        press: downloadTradingViewIndicatorCode,
                      }).addStyleClass("indicatorDownloadButton"),
                    ],
                  }).addStyleClass("indicatorDownloadRow tradingViewReferenceRow"),
                ],
              }).addStyleClass("tradingViewEndpointRow"),

              new sap.m.MessageStrip({
                text: "TradingView trigger: use Once Per Bar. Once only stops after 1 alert; Bar Close can widen SL risk.",
                type: "Information",
                showIcon: true,
              }).addStyleClass("tradingViewTriggerNote"),

              new sap.m.HBox({
                items: TRADINGVIEW_PAYLOADS.map(tradingViewPayloadCard),
              }).addStyleClass("payloadGrid"),
            ],
          }).addStyleClass("card tradingViewReferenceCard");
        }

        function createHeroTickerGroup() {
          return new sap.m.HBox({
            alignItems: "Center",
            items: [
              new sap.m.Text({
                text: {
                  parts: [
                    { path: "/NIFTY_NEXT_EXPIRY_LABEL" },
                    { path: "/NIFTY_NEXT_EXPIRY_META" },
                  ],
                  formatter: (label, meta) =>
                    `NIFTY Expiry • ${label || "-"}${meta ? ` • ${meta}` : ""}`,
                },
              }).addStyleClass("marketTickerItem"),
              new sap.m.Text({
                text: {
                  parts: [
                    { path: "/BANKNIFTY_NEXT_EXPIRY_LABEL" },
                    { path: "/BANKNIFTY_NEXT_EXPIRY_META" },
                  ],
                  formatter: (label, meta) =>
                    `BANKNIFTY Expiry • ${label || "-"}${meta ? ` • ${meta}` : ""}`,
                },
              }).addStyleClass("marketTickerItem"),
              new sap.m.Text({
                text: {
                  parts: [
                    { path: "/NSE_NEXT_HOLIDAY_LABEL" },
                    { path: "/NSE_NEXT_HOLIDAY_META" },
                  ],
                  formatter: (label, meta) =>
                    `Next Holiday • ${label || "-"}${meta ? ` • ${meta}` : ""}`,
                },
              }).addStyleClass("marketTickerItem"),
              new sap.m.Text({
                text: {
                  parts: [
                    { path: "/INDIA_VIX_LABEL" },
                    { path: "/INDIA_VIX_META" },
                  ],
                  formatter: function (label, meta) {
                    const value = String(label || "-").replace(
                      /^India VIX\s*/i,
                      "",
                    );

                    return `India VIX • ${value}${meta ? ` • ${meta}` : ""}`;
                  },
                },
              }).addStyleClass("marketTickerItem"),
            ],
          }).addStyleClass("marketTickerGroup");
        }

        // Assemble the dashboard page and group cards into tabs.
        cockpitTabs = new sap.m.IconTabBar({
          expandable: false,
          expanded: true,
          selectedKey: getSavedActiveTab(),
          select: function (e) {
            const selectedKey = e.getParameter("key");

            saveActiveTab(selectedKey);

            if (selectedKey === "planning") {
              calculateRisk();
            }

            if (selectedKey === "analytics") {
              model.setProperty("/ANALYTICS_PERIOD_OFFSET", 0);
              refreshTradeAnalytics();
            }

            if (selectedKey === "manualSignals") {
              refreshNiftySpotPrice();
              setTimeout(() => {
                const tile = document.querySelector(".manualIntervalGroup");
                if (!tile) return;

                tile.classList.remove("manualIntervalPulse");
                void tile.offsetWidth;
                tile.classList.add("manualIntervalPulse");
              }, 0);
            }

            if (selectedKey === "tradingView") {
              refreshNgrokUrl();
              refreshNetworkIp();
            }
          },
          items: [
            new sap.m.IconTabFilter({
              key: "tradingDesk",
              text: "Cockpit",
              icon: "images/tab-cockpit.png",
              content: [
                liveTradingStatusCard(),
                readinessCenterCard(),
                tradingPermissionsCard(),
                telegramCard(),
              ],
            }),

            new sap.m.IconTabFilter({
              key: "planning",
              text: "Risk Guard",
              icon: "images/tab-risk-guard.png",
              content: [planningCard()],
            }),

            new sap.m.IconTabFilter({
              key: "manualSignals",
              text: "Manual Signals",
              icon: "images/tab-manual-signals.png",
              content: [testCenterCard()],
            }),

            new sap.m.IconTabFilter({
              key: "monitoring",
              text: "Logs",
              icon: "images/tab-logs.png",
              content: [monitoringCard()],
            }),

            new sap.m.IconTabFilter({
              key: "tradingView",
              text: "TV Webhook",
              icon: "images/tab-tv-webhook.png",
              content: [tradingViewReferenceCard()],
            }),

            new sap.m.IconTabFilter({
              key: "analytics",
              text: "Analytics",
              icon: "images/tab-analytics.png",
              content: [analyticsCard()],
            }),
          ],
        }).addStyleClass("cockpitTabs");

        const page = new sap.m.Page({
          title: "IC Algo Bot Control Center",
          showHeader: false,
          content: [
            new sap.m.VBox({
              items: [
                new sap.m.HBox({
                  alignItems: "Center",
                  items: [
                    new sap.m.Avatar({
                      src: "images/ic-bull-face.png",
                      displaySize: "XL",
                      displayShape: "Circle",
                    }).addStyleClass("botAvatar"),

                    new sap.m.VBox({
                      items: [
                        new sap.m.Title({
                          text: "Inside Candle Trading Cockpit",
                          level: "H2",
                        }).addStyleClass("heroTitle"),

                        new sap.m.Text({
                          text: "Strategy automation, risk controls, and execution monitoring",
                        }).addStyleClass("heroText"),

                        new sap.m.HBox({
                          alignItems: "Center",
                          items: [
                            new sap.ui.core.Icon({
                              src: "sap-icon://activity-individual",
                              decorative: true,
                            }).addStyleClass("heroStatusIcon"),
                            new sap.m.Text({
                              text: {
                                parts: [
                                  { path: "/PAPER_TRADE" },
                                  { path: "/DHAN_ENV" },
                                  { path: "/algoLiveStatus/running" },
                                ],
                                formatter: function (paperTrade, dhanEnv, running) {
                                  const mode =
                                    paperTrade === "true"
                                      ? "Paper Mode"
                                      : `${dhanEnv || "LIVE"} Mode`;
                                  return `${mode} • ${
                                    running ? "Algo online" : "Algo offline"
                                  }`;
                                },
                              },
                            }).addStyleClass("heroStatusText"),
                          ],
                        }).addStyleClass("heroStatusPill"),

                        new sap.m.HBox({
                          items: [
                            new sap.m.VBox({
                              items: [
                                new sap.m.Text({
                                  text: "Today",
                                }).addStyleClass("marketChipLabel"),
                                new sap.m.Text({
                                  text: "{/MARKET_TODAY_LABEL}",
                                }).addStyleClass("marketChipValue"),
                              ],
                            }).addStyleClass("marketChip marketChipToday"),

                            new sap.m.VBox({
                              items: [
                                new sap.m.Text({
                                  text: "Next Expiry",
                                }).addStyleClass("marketChipLabel"),
                                new sap.m.Text({
                                  text: {
                                    parts: [
                                      { path: "/NIFTY_NEXT_EXPIRY_LABEL" },
                                      { path: "/NIFTY_NEXT_EXPIRY_META" },
                                    ],
                                    formatter: (label, meta) =>
                                      meta ? `${label} • ${meta}` : label,
                                  },
                                }).addStyleClass("marketChipValue"),
                              ],
                            }).addStyleClass("marketChip marketChipExpiry"),
                          ],
                        }).addStyleClass("marketDayStrip"),
                      ],
                    }).addStyleClass("heroMainContent"),

                    new sap.m.VBox({
                      visible: {
                        parts: [
                          { path: "/MARKET_EVENT_VISIBLE" },
                          { path: "/INDIA_VIX_LABEL" },
                        ],
                        formatter: (eventVisible, vixLabel) =>
                          Boolean(eventVisible || vixLabel),
                      },
                      customData: [
                        new sap.ui.core.CustomData({
                          key: "severity",
                          value: "{/MARKET_EVENT_SEVERITY}",
                          writeToDom: true,
                        }),
                      ],
                      items: [
                        new sap.m.Text({
                          text: "Market Events",
                        }).addStyleClass("marketChipLabel"),
                        new sap.m.Text({
                          text: {
                            parts: [
                              { path: "/MARKET_EVENT_LABEL" },
                              { path: "/MARKET_EVENT_META" },
                            ],
                            formatter: (label, meta) =>
                              meta ? `${label} • ${meta}` : label,
                          },
                          visible: "{/MARKET_EVENT_VISIBLE}",
                        }).addStyleClass("marketChipValue marketEventValue"),
                        new sap.m.Text({
                          text: {
                            parts: [
                              { path: "/INDIA_VIX_LABEL" },
                              { path: "/INDIA_VIX_META" },
                            ],
                            formatter: (label, meta) =>
                              meta ? `${label} • ${meta}` : label,
                          },
                        }).addStyleClass("marketChipValue marketVixValue"),
                        new sap.m.Button({
                          text: "Emergency Stop",
                          icon: "sap-icon://alert",
                          type: "Reject",
                          visible: "{/MARKET_EVENT_EMERGENCY_VISIBLE}",
                          press: emergencyStop,
                        }).addStyleClass("marketEventStopButton"),
                      ],
                    }).addStyleClass("marketEventsPanel"),

                    new sap.m.HBox({
                      alignItems: "Center",
                      items: [
                        new sap.m.HBox({
                          alignItems: "Center",
                          items: [
                            createHeroTickerGroup(),
                            createHeroTickerGroup(),
                          ],
                        }).addStyleClass("marketTickerTrack"),
                      ],
                    }).addStyleClass("marketTicker"),
                  ],
                }).addStyleClass("heroCard"),

                cockpitTabs,
              ],
            }).addStyleClass("dashboardShell"),
          ],
        });

        // Initial data load before the app is placed on screen.
        await refreshConfig();
        await refreshAlgoStatus();
        await refreshNgrokUrl();
        await refreshNetworkIp();
        await refreshMarketCalendar();
        await refreshLogs();
        await refreshDhanHealth();
        maybeShowDhanTokenExpiryWarning();
        await refreshTradeAnalytics();

        // Keep operational status fresh while the dashboard stays open.
        setInterval(refreshAlgoStatus, 5000);
        setInterval(refreshNgrokUrl, 5000);
        setInterval(refreshNetworkIp, 5000);
        setInterval(refreshMarketCalendar, 300000);
        setInterval(refreshLogs, 5000);
        setInterval(refreshDhanHealth, 60000);
        setInterval(refreshTradeAnalytics, 30000);
        setInterval(() => {
          model.setProperty("/TOKEN_COUNTDOWN_TICK", Date.now());
          maybeShowDhanTokenExpiryWarning();
        }, 60000);

        // Render the OpenUI5 app into the body placeholder.
        new sap.m.App({ pages: [page] }).placeAt("content");
      });
    </script>
  </head>

  <body class="sapUiBody" id="content"></body>
</html>
